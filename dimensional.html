</head><body><div class="app"><script>document.write(renderShell('dimensional'))</script><main class="main"><header class="top"><div><h1>Informe dimensional</h1><p>Documento de control dimensional. Selección oficial de características KCS.</p></div><div class="actions noPrint"><a class="btn light" href="index.html">Cargar Excel</a><button class="btn light" onclick="window.print()">Guardar PDF</button><button class="btn" onclick="window.print()">Imprimir</button></div></header><div id="root"></div></main></div><script>
let p=loadProject();
const root=document.getElementById('root');
function setKcs(n,checked){
  p=loadProject();
  const map=loadKcsSelection(p);
  const key=String(n);
  if(checked)map[key]=true;
  else delete map[key];

<script>
/* PARAMIO_V247_KCS_SINGLE_SOURCE
   Fuente única KCS desde Dimensional.
   Guarda globos seleccionados en varias claves compatibles para KCS, ISIR y Plan de Control.
*/
(function(){
  const KCS_KEYS = [
    "paramio_kcs_globos",
    "paramio_kcs_selected_globos",
    "paramio_selected_kcs",
    "paramio_dimensional_kcs",
    "kcsSelectedGlobos"
  ];

  function getGloboFromRow(row){
    if(!row) return null;
    const cells = Array.from(row.querySelectorAll("td,th"));
    for(const c of cells){
      const t = (c.innerText || c.textContent || "").trim();
      const m = t.match(/^(\d{1,5})$/);
      if(m) return String(parseInt(m[1],10));
    }
    const data = row.getAttribute("data-globo") || row.getAttribute("data-cota") || row.dataset.globo || row.dataset.cota;
    if(data && /^\d+$/.test(String(data))) return String(parseInt(data,10));
    return null;
  }

  function isKcsCheckbox(cb){
    if(!cb || cb.type !== "checkbox") return false;
    const row = cb.closest("tr");
    if(!row) return false;
    const txt = (row.innerText || "").toUpperCase();
    return txt.includes("KCS") || txt.includes("MARCAR") || cb.closest("td")?.innerText?.toUpperCase().includes("KCS");
  }

  function collectSelected(){
    const selected = new Set();

    document.querySelectorAll("tr").forEach(row=>{
      const cb = Array.from(row.querySelectorAll("input[type='checkbox']")).find(isKcsCheckbox);
      if(!cb || !cb.checked) return;
      const globo = getGloboFromRow(row);
      if(globo) selected.add(globo);
    });

    const arr = Array.from(selected).sort((a,b)=>Number(a)-Number(b));
    const json = JSON.stringify(arr);
    KCS_KEYS.forEach(k=>localStorage.setItem(k,json));
    localStorage.setItem("paramio_kcs_updated_at", new Date().toISOString());
    window.paramioKcsGlobos = arr;
    return arr;
  }

  function restoreChecked(){
    let arr = [];
    for(const k of KCS_KEYS){
      try{
        const raw = localStorage.getItem(k);
        if(raw){
          const parsed = JSON.parse(raw);
          if(Array.isArray(parsed)){ arr = parsed.map(x=>String(parseInt(x,10))).filter(x=>x !== "NaN"); break; }
        }
      }catch(e){}
    }
    if(!arr.length) return;
    const set = new Set(arr);
    document.querySelectorAll("tr").forEach(row=>{
      const globo = getGloboFromRow(row);
      if(!globo) return;
      const cb = Array.from(row.querySelectorAll("input[type='checkbox']")).find(isKcsCheckbox);
      if(cb) cb.checked = set.has(globo);
    });
  }

  document.addEventListener("change", function(ev){
    if(ev.target && ev.target.matches("input[type='checkbox']")){
      setTimeout(collectSelected, 20);
    }
  }, true);

  window.paramioSaveKcsFromDimensional = collectSelected;

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(function(){
      restoreChecked();
      collectSelected();
    }, 500);
  });

  setTimeout(function(){
    restoreChecked();
    collectSelected();
  }, 1200);
})();
</script>

<script>
/* PARAMIO_V248_KCS_VISUAL_MULTICOLUMN */
(function(){

function buildTopSelector(){
  if(document.getElementById("paramioPieceSelector")) return;

  const anchor =
    document.querySelector("main") ||
    document.querySelector(".content") ||
    document.body;

  const box = document.createElement("div");
  box.className = "paramio-piece-selector";
  box.id = "paramioPieceSelector";

  box.innerHTML = `
    <strong>Nº piezas medición:</strong>
    <select id="paramioPiecesCount">
      <option value="1">1 pieza</option>
      <option value="2">2 piezas</option>
      <option value="3" selected>3 piezas</option>
      <option value="4">4 piezas</option>
      <option value="5">5 piezas</option>
    </select>
  `;

  anchor.insertBefore(box, anchor.firstChild);

  const saved = localStorage.getItem("paramio_dimensional_piece_count");
  if(saved){
    document.getElementById("paramioPiecesCount").value = saved;
  }

  document.getElementById("paramioPiecesCount").addEventListener("change", function(){
    localStorage.setItem("paramio_dimensional_piece_count", this.value);
    buildDynamicColumns(parseInt(this.value,10));
  });
}

function findHeaderRow(table){
  return table.querySelector("thead tr") || table.querySelector("tr");
}

function buildDynamicColumns(count){
  const tables = Array.from(document.querySelectorAll("table"));

  tables.forEach(table=>{
    const header = findHeaderRow(table);
    if(!header) return;

    const txt = (header.innerText || "").toUpperCase();
    if(!txt.includes("REGISTRO PIEZA")) return;

    // limpiar columnas antiguas dinámicas
    header.querySelectorAll(".paramio-dyn").forEach(el=>el.remove());

    for(let i=1;i<=count;i++){
      const th1 = document.createElement("th");
      th1.className = "paramio-dyn";
      th1.innerText = "REGISTRO PIEZA " + i;
      header.appendChild(th1);

      const th2 = document.createElement("th");
      th2.className = "paramio-dyn";
      th2.innerText = "ESTADO PIEZA " + i;
      header.appendChild(th2);
    }

    const rows = Array.from(table.querySelectorAll("tbody tr")).filter(r=>r.querySelectorAll("td").length);

    rows.forEach(row=>{
      row.querySelectorAll(".paramio-dyn").forEach(el=>el.remove());

      for(let i=1;i<=count;i++){
        const td1 = document.createElement("td");
        td1.className = "paramio-dyn";
        td1.innerHTML = `<input type="text" placeholder="Manual" style="width:120px;padding:8px;border-radius:8px;border:1px solid #c7d3e5;font-weight:800;text-align:center">`;

        const td2 = document.createElement("td");
        td2.className = "paramio-dyn";
        td2.innerHTML = `<span style="display:inline-block;padding:5px 10px;border-radius:999px;background:#fff3cd;color:#946200;font-weight:900;font-size:11px">PEND.</span>`;

        row.appendChild(td1);
        row.appendChild(td2);
      }
    });
  });
}

function convertKcsCheckboxes(){
  document.querySelectorAll("tr").forEach(row=>{
    const cells = Array.from(row.querySelectorAll("td"));

    cells.forEach(td=>{
      const cb = td.querySelector('input[type="checkbox"]');
      if(!cb || td.querySelector(".paramio-kcs-toggle")) return;

      const txt = (row.innerText || "").toUpperCase();
      if(!txt.includes("KCS") && !txt.includes("MARCAR")) return;

      cb.style.display = "none";

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "paramio-kcs-toggle";
      btn.innerText = cb.checked ? "KCS ACTIVA" : "MARCAR KCS";

      if(cb.checked) btn.classList.add("active");

      btn.addEventListener("click", function(){
        cb.checked = !cb.checked;

        if(cb.checked){
          btn.classList.add("active");
          btn.innerText = "KCS ACTIVA";
        }else{
          btn.classList.remove("active");
          btn.innerText = "MARCAR KCS";
        }

        cb.dispatchEvent(new Event("change",{bubbles:true}));
      });

      td.appendChild(btn);
    });
  });
}

document.addEventListener("DOMContentLoaded", function(){
  setTimeout(function(){
    buildTopSelector();
    convertKcsCheckboxes();

    const count = parseInt(localStorage.getItem("paramio_dimensional_piece_count") || "3",10);
    buildDynamicColumns(count);

  },700);
});

})();
</script>


<script>
/* PARAMIO_V249_PIECES_FREE_NUMBER
   Sustituye selector limitado por número libre de piezas.
   Permite lotes grandes: 1..500 piezas.
*/
(function(){
  function replaceSelector(){
    const old = document.getElementById("paramioPiecesCount");
    if(old && old.tagName === "SELECT"){
      const value = old.value || localStorage.getItem("paramio_dimensional_piece_count") || "3";
      const input = document.createElement("input");
      input.id = "paramioPiecesCount";
      input.type = "number";
      input.min = "1";
      input.max = "500";
      input.step = "1";
      input.value = value;
      input.style.cssText = "width:140px;padding:9px 12px;border-radius:8px;border:1px solid #bcc9dc;font-weight:900";
      old.replaceWith(input);
      input.addEventListener("change", function(){
        let n = parseInt(this.value || "1", 10);
        if(!Number.isFinite(n) || n < 1) n = 1;
        if(n > 500) n = 500;
        this.value = n;
        localStorage.setItem("paramio_dimensional_piece_count", String(n));
        if(typeof buildDynamicColumns === "function"){
          buildDynamicColumns(n);
        }else{
          window.paramioBuildDimensionalPiecesV249(n);
        }
      });
    }

    const box = document.getElementById("paramioPieceSelector");
    if(box){
      const strong = box.querySelector("strong");
      if(strong) strong.textContent = "Nº piezas medición / lote:";
      if(!document.getElementById("paramioPiecesHint")){
        const hint = document.createElement("span");
        hint.id = "paramioPiecesHint";
        hint.style.cssText = "font-size:12px;color:#52647d;font-weight:700";
        hint.textContent = "Introduce cualquier cantidad. Ej.: 10, 50, 200.";
        box.appendChild(hint);
      }
    }
  }

  window.paramioBuildDimensionalPiecesV249 = function(count){
    count = parseInt(count || localStorage.getItem("paramio_dimensional_piece_count") || "3", 10);
    if(!Number.isFinite(count) || count < 1) count = 1;
    if(count > 500) count = 500;
    localStorage.setItem("paramio_dimensional_piece_count", String(count));

    const tables = Array.from(document.querySelectorAll("table"));
    tables.forEach(table=>{
      const header = table.querySelector("thead tr") || table.querySelector("tr");
      if(!header) return;
      const txt = (header.innerText || "").toUpperCase();
      if(!txt.includes("REGISTRO PIEZA") && !txt.includes("ESTADO PIEZA")) return;

      header.querySelectorAll(".paramio-dyn-v249,.paramio-dyn").forEach(el=>el.remove());

      for(let i=1;i<=count;i++){
        const th1=document.createElement("th");
        th1.className="paramio-dyn-v249";
        th1.innerText="REGISTRO PIEZA "+i;
        const th2=document.createElement("th");
        th2.className="paramio-dyn-v249";
        th2.innerText="ESTADO PIEZA "+i;
        header.appendChild(th1); header.appendChild(th2);
      }

      Array.from(table.querySelectorAll("tbody tr")).forEach(row=>{
        if(!row.querySelectorAll("td").length) return;
        row.querySelectorAll(".paramio-dyn-v249,.paramio-dyn").forEach(el=>el.remove());
        for(let i=1;i<=count;i++){
          const td1=document.createElement("td");
          td1.className="paramio-dyn-v249";
          td1.innerHTML='<input type="text" placeholder="Manual" style="width:120px;padding:8px;border-radius:8px;border:1px solid #c7d3e5;font-weight:800;text-align:center">';
          const td2=document.createElement("td");
          td2.className="paramio-dyn-v249";
          td2.innerHTML='<span style="display:inline-block;padding:5px 10px;border-radius:999px;background:#fff3cd;color:#946200;font-weight:900;font-size:11px">PEND.</span>';
          row.appendChild(td1); row.appendChild(td2);
        }
      });
    });
  };

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(function(){
      replaceSelector();
      const n = parseInt(localStorage.getItem("paramio_dimensional_piece_count") || "3", 10);
      window.paramioBuildDimensionalPiecesV249(n);
    }, 1100);
  });
})();
</script>

  const SKIP_TAGS = new Set(["SCRIPT","STYLE","NOSCRIPT","TEXTAREA"]);
  const INPUT_TYPES_TO_TRANSLATE = new Set(["button","submit","reset"]);

  function sortedKeys(){
    return Object.keys(DICT).sort((a,b)=>b.length-a.length);
  }

  function looksTechnicalOnly(txt){
    const t = String(txt || "").trim();
    if(!t) return true;
    if(/^[-+0-9.,/ %:;()ØA-Z_]+$/.test(t) && !/[a-záéíóúñü]/i.test(t.replace(/[A-Z]/g,''))) return true;
    if(/^CE\d+|^[A-Z]{1,4}\d{2,}/.test(t)) return true;
    return false;
  }

  function translateString(original, lang){
    if(lang === "es") return original;
    let txt = String(original);
    for(const es of sortedKeys()){
      const en = DICT[es];
      txt = txt.split(es).join(en);
      txt = txt.split(es.toUpperCase()).join(String(en).toUpperCase());
    }
    return txt;
  }

  function translateTextNode(node, lang){
    const parent = node.parentElement;
    if(!parent || SKIP_TAGS.has(parent.tagName)) return;
    const val = node.nodeValue;
    if(!val || !val.trim()) return;
    if(looksTechnicalOnly(val)) return;
    if(!node.__paramioOriginalText) node.__paramioOriginalText = val;
    node.nodeValue = translateString(node.__paramioOriginalText, lang);
  }

  function translateAttributes(el, lang){
    ["placeholder","title","aria-label","alt"].forEach(attr=>{
      if(!el.hasAttribute || !el.hasAttribute(attr)) return;
      const key = "__paramioOriginal_" + attr;
      if(!el[key]) el[key] = el.getAttribute(attr);
      el.setAttribute(attr, translateString(el[key], lang));
    });

    if(el.tagName === "INPUT" && INPUT_TYPES_TO_TRANSLATE.has((el.type||"").toLowerCase())){
      if(!el.__paramioOriginalValue) el.__paramioOriginalValue = el.value;
      el.value = translateString(el.__paramioOriginalValue, lang);
    }
  }

  function walk(lang){
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        const p = node.parentElement;
        if(!p || SKIP_TAGS.has(p.tagName)) return NodeFilter.FILTER_REJECT;
        if(!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_SKIP;
        if(looksTechnicalOnly(node.nodeValue)) return NodeFilter.FILTER_SKIP;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes=[];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(n=>translateTextNode(n, lang));

    document.querySelectorAll("*").forEach(el=>translateAttributes(el, lang));
    document.querySelectorAll("option").forEach(op=>{
      if(!op.__paramioOriginalText) op.__paramioOriginalText = op.textContent;
      op.textContent = translateString(op.__paramioOriginalText, lang);
    });

    document.querySelectorAll(".paramio-lang-switch button").forEach(b=>b.classList.toggle("active", b.dataset.lang===lang));
  }

  function observe(){
    if(window.__paramioV250Observer) return;
    window.__paramioV250Observer = new MutationObserver(function(){
      clearTimeout(window.__paramioV250Timer);
      window.__paramioV250Timer = setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 120);
    });
    window.__paramioV250Observer.observe(document.body, {childList:true, subtree:true, characterData:true});
  }

  function makeSwitch(){
    if(document.getElementById("paramioLangSwitch")) return;
    const box = document.createElement("div");
    box.id="paramioLangSwitch";
    box.className="paramio-lang-switch";
    box.innerHTML='<strong style="font-size:12px;margin:0 4px">LANG</strong><button data-lang="es">ES</button><button data-lang="en">EN</button>';
    document.body.appendChild(box);
    box.querySelectorAll("button").forEach(btn=>{
      btn.addEventListener("click",()=>{
        localStorage.setItem("paramio_doc_lang",btn.dataset.lang);
        walk(btn.dataset.lang);
      });
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    makeSwitch();
    const lang = localStorage.getItem("paramio_doc_lang") || "es";
    walk(lang);
    observe();
    setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 500);
    setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 1500);
  });

  window.paramioSetLanguage = function(lang){
    localStorage.setItem("paramio_doc_lang",lang);
    walk(lang);
  };
  window.paramioTranslateNow = function(){ walk(localStorage.getItem("paramio_doc_lang") || "es"); };
})();
</script>
