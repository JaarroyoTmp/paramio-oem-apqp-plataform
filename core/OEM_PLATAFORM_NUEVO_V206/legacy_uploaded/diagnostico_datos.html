<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Diagnóstico datos reales Paramio</title>
<style>
body{font-family:Arial, sans-serif;background:#eef3fa;color:#071a3a;margin:0;padding:24px}
h1{margin:0 0 10px}
.card{background:white;border:1px solid #cbd8ee;border-radius:16px;padding:18px;margin:14px 0;box-shadow:0 8px 24px rgba(0,0,0,.06)}
button{background:#315cff;color:white;border:0;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;margin-right:8px}
pre{background:#071a3a;color:#eaf2ff;padding:14px;border-radius:12px;overflow:auto;max-height:420px;font-size:12px}
table{width:100%;border-collapse:collapse;background:white;margin-top:10px}
th,td{border:1px solid #cbd8ee;padding:8px;text-align:left;vertical-align:top}
th{background:#d8e2f3}
.bad{color:#b00020;font-weight:900}
.ok{color:#0a8a3a;font-weight:900}
.small{font-size:12px;color:#445}
input{padding:10px;border:1px solid #cbd8ee;border-radius:10px;width:280px}
</style>
</head>
<body>
<h1>Diagnóstico datos reales Paramio</h1>
<p>Esta página no modifica nada. Solo muestra qué datos hay guardados realmente en el navegador.</p>

<div class="card">
  <button onclick="run()">Leer datos</button>
  <button onclick="clearData()">Borrar datos Paramio</button>
  <input id="globos" value="2,5,6,26,123,145" />
  <p class="small">Abre esta página desde la misma carpeta que index.html.</p>
</div>

<div id="out"></div>

<script>
function getAllStorage(){
  const obj={localStorage:{},sessionStorage:{}};
  Object.keys(localStorage).forEach(k=>obj.localStorage[k]=localStorage.getItem(k));
  Object.keys(sessionStorage).forEach(k=>obj.sessionStorage[k]=sessionStorage.getItem(k));
  return obj;
}
function tryJson(v){try{return JSON.parse(v)}catch(e){return null}}
function findProjects(){
  const found=[];
  for(const storeName of ['localStorage','sessionStorage']){
    const store = storeName==='localStorage'?localStorage:sessionStorage;
    Object.keys(store).forEach(k=>{
      const val=store.getItem(k);
      const j=tryJson(val);
      if(j && (j.characteristics || j.meta || j.results || j.version)){
        found.push({store:storeName,key:k,value:j});
      }
    });
  }
  return found;
}
function vals(obj){
  if(!obj)return [];
  if(Array.isArray(obj.items))return obj.items;
  if(Array.isArray(obj))return obj;
  return [];
}
function cNum(c){return String(c.number ?? c.globo ?? c.id ?? '').trim()}
function pcText(it){
  try{return JSON.stringify(it).toUpperCase()}catch(e){return ''}
}
function detectAxis(it){
  const t=pcText(it);
  const k=String(it.kind||it.axis||'').toUpperCase();
  if(k)return k;
  if(/["\\s,;:]TP["\\s,;:]|\\bTP\\b/.test(t))return 'TP';
  if(/PERFIL|PROFILE/.test(t))return 'PERF';
  if(/UBICACI|LOCATION/.test(t))return 'UBIC';
  if(/PLANITUD|FLATNESS/.test(t))return 'FLATNESS';
  if(/["\\s,;:]DF["\\s,;:]/.test(t))return 'DF';
  if(/["\\s,;:]2D["\\s,;:]/.test(t))return '2D';
  if(/["\\s,;:]X["\\s,;:]/.test(t))return 'X';
  if(/["\\s,;:]Y["\\s,;:]/.test(t))return 'Y';
  if(/["\\s,;:]Z["\\s,;:]/.test(t))return 'Z';
  if(/["\\s,;:]D\\d*["\\s,;:]/.test(t))return 'D';
  return '';
}
function meas(it){return String(it.measured ?? it.value ?? it.result ?? it.valor ?? '').trim()}
function renderProject(pwrap, wanted){
  const p=pwrap.value;
  const chars=p.characteristics||[];
  let html=`<div class="card"><h2>${pwrap.store}: ${pwrap.key}</h2>`;
  html+=`<p>Características: <b>${chars.length}</b></p>`;
  html+=`<table><tr><th>Globo</th><th>Característica</th><th>FeatureType</th><th>results keys</th><th>items pieza 1</th><th>TP detectados</th><th>Todos los valores</th></tr>`;
  wanted.forEach(n=>{
    const c=chars.find(x=>String(cNum(x))===String(n));
    if(!c){
      html+=`<tr><td>${n}</td><td colspan="6" class="bad">No encontrada</td></tr>`;
      return;
    }
    const r=(c.results||{})['1'] || (c.results||{})['P1'] || Object.values(c.results||{})[0];
    const items=vals(r);
    const axes=items.map(detectAxis);
    const tps=items.filter(it=>detectAxis(it)==='TP').map(meas);
    const all=items.map((it,i)=>`${i+1}. ${detectAxis(it)} = ${meas(it)} | ${String(it.desc||it.name||'').slice(0,80)}`).join('<br>');
    html+=`<tr>
      <td>${n}</td>
      <td>${c.value||c.characteristic||''}</td>
      <td>${c.featureType||''}</td>
      <td>${Object.keys(c.results||{}).join(', ')}</td>
      <td>${items.length}</td>
      <td class="${tps.length?'ok':'bad'}">${tps.join('<br>')||'NO TP'}</td>
      <td>${all}</td>
    </tr>`;
  });
  html+=`</table><details><summary>JSON completo proyecto</summary><pre>${escapeHtml(JSON.stringify(p,null,2))}</pre></details></div>`;
  return html;
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]))}
function run(){
  const wanted=document.getElementById('globos').value.split(',').map(x=>x.trim()).filter(Boolean);
  const projects=findProjects();
  let html='';
  if(!projects.length){
    html='<div class="card bad">No he encontrado ningún proyecto guardado en localStorage/sessionStorage.</div>';
  }else{
    html+=`<div class="card ok">Proyectos encontrados: ${projects.length}</div>`;
    projects.forEach(p=>html+=renderProject(p,wanted));
  }
  html+=`<div class="card"><h2>Claves storage</h2><pre>${escapeHtml(JSON.stringify(Object.keys(localStorage),null,2))}</pre></div>`;
  document.getElementById('out').innerHTML=html;
}
function clearData(){
  if(!confirm('Borrar datos Paramio/OEM del navegador?'))return;
  Object.keys(localStorage).forEach(k=>{if(k.toLowerCase().includes('paramio')||k.toLowerCase().includes('oem'))localStorage.removeItem(k)});
  Object.keys(sessionStorage).forEach(k=>{if(k.toLowerCase().includes('paramio')||k.toLowerCase().includes('oem'))sessionStorage.removeItem(k)});
  alert('Datos borrados. Vuelve a index.html, carga Excel y procesa.');
}
run();
</script>
</body>
</html>
