<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KCS V206</title><link rel="stylesheet" href="assets/platform.css"><script src="core/storage.js"></script><script src="core/type-normalizer.js"></script><script src="core/parser-inspection.js"></script><script src="core/parser-pcdmis.js"></script><script src="core/validation-engine.js"></script><script src="core/strategies/dimension.js"></script><script src="core/strategies/position.js"></script><script src="core/strategies/profile.js"></script><script src="core/strategies/diameter.js"></script><script src="core/strategies/flatness.js"></script><script src="core/strategies/orientation.js"></script><script src="core/strategies/depth.js"></script><script src="core/strategies/radius.js"></script><script src="core/strategies/thread.js"></script><script src="core/result-engine.js"></script></head>
<body><div class="app"><script>document.write(renderShell('kcs'))</script><main class="main"><header class="top"><div><h1>KCS</h1><p>Selección de cotas críticas. Usa el motor común.</p></div><div class="actions noPrint"><a class="btn light" href="index.html">Cargar Excel</a><button class="btn" onclick="window.print()">Imprimir</button></div></header><div id="root"></div></main></div><script>
let p=loadProject();const root=document.getElementById('root');function setKcs(n,checked){p=loadProject();const c=p.characteristics.find(x=>String(x.number)===String(n));if(c){c.kcs=checked;saveProject(p);}}function selectByStatus(status){p=loadProject();p.characteristics.forEach(c=>{if(status==='NOK'&&statusOf(c)==='NOK')c.kcs=true;if(status==='ALL')c.kcs=true;if(status==='NONE')c.kcs=false;});saveProject(p);render();}function render(){p=loadProject();if(!p||!p.characteristics.length){root.innerHTML=noDataHtml();return;}const chars=filterRows(p.characteristics),selected=p.characteristics.filter(c=>c.kcs).length,pieces=selectedPieces(p,false);root.innerHTML=`<section class="card"><div class="docHead"><div><img class="logoSmall" src="assets/logo_paramio.png"><h2>Selección KCS</h2><p>Marca cotas críticas. Los resultados usan el motor común.</p></div>${metaHtml(p)}</div></section><section class="card noPrint"><div class="toolbar"><input id="filter" type="search" placeholder="Filtrar globo / característica" oninput="window.__lastFilter=this.value;render()"><div>${piecesControl(p)}</div><div class="actions"><button class="btn" onclick="selectByStatus('NOK')">Marcar NOK</button><button class="btn light" onclick="selectByStatus('ALL')">Marcar todas</button><button class="btn light" onclick="selectByStatus('NONE')">Limpiar KCS</button></div></div></section><section class="card"><div class="statGrid"><div class="stat"><b>${p.characteristics.length}</b><span>Cotas totales</span></div><div class="stat"><b>${selected}</b><span>KCS seleccionadas</span></div><div class="stat"><b>${p.characteristics.filter(c=>statusOf(c)==='NOK').length}</b><span>NOK</span></div><div class="stat"><b>${p.characteristics.filter(c=>statusOf(c)==='PEND.').length}</b><span>Pend.</span></div><div class="stat"><b>${pieceLabels(p).length}</b><span>Piezas detectadas</span></div></div></section><section class="card"><h2>Seleccionar KCS</h2><div class="tableWrap"><table><thead><tr><th>KCS</th><th>Globo</th><th>Tipo</th><th>Característica</th><th>Especificación</th>${pieces.map(x=>`<th>Registro pieza ${esc(x)}</th><th>Estado pieza ${esc(x)}</th>`).join('')}</tr></thead><tbody>${chars.map(c=>`<tr><td><input class="kcsBox" type="checkbox" ${c.kcs?'checked':''} onchange="setKcs('${esc(c.number)}',this.checked)"></td><td>${esc(c.number)}</td><td><b>${esc(featureType(c))}</b></td><td>${esc(cleanChar(c.value))}</td><td>${specText(c)}</td>${pieces.map(x=>`<td class="result">${resultCell(c,x)}</td><td>${statusPill(pieceStatus(c,x))}</td>`).join('')}</tr>`).join('')}</tbody></table></div></section>`;const f=document.getElementById('filter');if(f)f.value=(window.__lastFilter||'');}render();
</script></body></html>
