<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Diagnóstico V207</title><link rel="stylesheet" href="assets/platform.css"><script src="core/storage.js"></script><script src="core/type-normalizer.js"></script><script src="core/parser-inspection.js"></script><script src="core/parser-pcdmis.js"></script><script src="core/validation-engine.js"></script><script src="core/strategies/dimension.js"></script><script src="core/strategies/position.js"></script><script src="core/strategies/profile.js"></script><script src="core/strategies/diameter.js"></script><script src="core/strategies/flatness.js"></script><script src="core/strategies/orientation.js"></script><script src="core/strategies/depth.js"></script><script src="core/strategies/radius.js"></script><script src="core/strategies/thread.js"></script><script src="core/result-engine.js"></script></head>
<body><div class="app"><script>document.write(renderShell('diag'))</script><main class="main"><header class="top"><div><h1>Diagnóstico CORE V207</h1><p>RAW BLOCK VIEW: todo lo que PC-DMIS contiene dentro de cada COTA antes del matching.</p></div><div class="actions noPrint"><a class="btn light" href="index.html">Cargar Excel</a><button class="btn orange" onclick="exportDiagCsv()">Exportar CSV</button></div></header><div id="root"></div></main></div>
<script>
let p=loadProject();const root=document.getElementById('root');
function itemLabel(it){return `${axisOf(it)||'-'} ${it.role||''} · D=${it.nominal||''} · E=${measured(it)||''} · F=${it.plus||''} · G=${it.minus||''}`;}
function rawBlocksFor(cota,piece='1'){return (p&&p.pcdmisRawBlocks&&p.pcdmisRawBlocks[String(piece)]&&p.pcdmisRawBlocks[String(piece)][String(cota)])||[];}
function rawRowHtml(r){const usable=Number.isFinite(num(r.D_nominal))&&Number.isFinite(num(r.E_medida));return `<tr class="${r.marker?'diagMed':usable?'diagHigh':'diagLow'}"><td>${esc(r.rowIndex)}</td><td>${esc(r.A)}</td><td>${esc(r.B)}</td><td>${esc(r.C)}</td><td>${esc(r.D_nominal)}</td><td><b>${esc(r.E_medida)}</b></td><td>${esc(r.F_tolPlus)}</td><td>${esc(r.G_tolMinus)}</td><td>${esc(r.H_desv)}</td><td>${esc(r.I_extra)}</td><td><b>${esc(r.axis||'')}</b></td><td>${esc(r.role||'')}</td></tr>`;}
function renderRawBlock(cota){const piece=document.getElementById('rawPiece')?.value||'1';const rows=rawBlocksFor(cota,piece);const el=document.getElementById('rawBlock');if(!rows.length){el.innerHTML=`<div class="notice badNotice">No hay RAW guardado para COTA ${esc(cota)} pieza ${esc(piece)}. Reprocesa desde V207.</div>`;return;}el.innerHTML=`<h3>RAW BLOCK VIEW · COTA ${esc(cota)} · Pieza ${esc(piece)}</h3><div class="notice">Todo lo que hay desde <b>COTA ${esc(cota)}</b> hasta la siguiente COTA. Verde = D y E numéricos; rojo = fila no útil como medición pero guardada.</div><div class="tableWrap"><table><thead><tr><th>Fila</th><th>A</th><th>B</th><th>C</th><th>D nominal</th><th>E medida</th><th>F +</th><th>G -</th><th>H</th><th>I</th><th>Axis</th><th>Role</th></tr></thead><tbody>${rows.map(rawRowHtml).join('')}</tbody></table></div>`;}
function exportDiagCsv(){if(!p){alert('No hay proyecto');return;}const rows=[['Cota','Inspection','Tipo','Estado','Motivo','Items usados']];p.characteristics.forEach(c=>{const d=diagFor(c,'1');rows.push([c.number,c.value,featureType(c),d.status,d.reason,d.items.map(itemLabel).join(' | ')]);});const csv=rows.map(r=>r.map(x=>`"${String(x??'').replace(/"/g,'""')}"`).join(';')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='diagnostico_core_v205.csv';a.click();URL.revokeObjectURL(a.href);}
function render(){p=loadProject();if(!p||!p.characteristics.length){root.innerHTML=noDataHtml();return;}const opts=p.characteristics.map(c=>`<option value="${esc(c.number)}">${esc(c.number)} · ${esc(cleanChar(c.value)).slice(0,70)}</option>`).join('');const rows=p.characteristics.map(c=>{const d=diagFor(c,'1');const cls=d.status==='OK_LINK'?'diagHigh':d.status==='SIN_REGLA'?'diagMed':'diagLow';return `<tr class="${cls}"><td><button class="btn light" onclick="document.getElementById('rawCota').value='${esc(c.number)}';renderRawBlock('${esc(c.number)}')">${esc(c.number)}</button></td><td>${esc(c.value)}</td><td><b>${esc(featureType(c))}</b></td><td>${d.items.map(itemLabel).join('<br>')||'Sin item seleccionado'}</td><td><b>${esc(d.status)}</b><br>${esc(d.reason)}</td><td>${statusPill(pieceStatus(c,'1'))}</td></tr>`}).join('');root.innerHTML=`<section class="card"><div class="statGrid"><div class="stat"><b>${p.characteristics.length}</b><span>Cotas</span></div><div class="stat"><b>${p.pcdmisFiles?.length||0}</b><span>PC-DMIS</span></div><div class="stat"><b>${p.characteristics.filter(c=>statusOf(c)==='OK').length}</b><span>OK</span></div><div class="stat"><b>${p.characteristics.filter(c=>statusOf(c)==='NOK').length}</b><span>NOK</span></div><div class="stat"><b>${p.characteristics.filter(c=>statusOf(c)==='PEND.').length}</b><span>Pend.</span></div></div></section><section class="card noPrint"><h2>RAW BLOCK VIEW</h2><div class="grid"><div><label>Cota</label><select id="rawCota">${opts}</select></div><div><label>Pieza</label><input id="rawPiece" value="1"></div><div style="display:flex;align-items:end"><button class="btn green" onclick="renderRawBlock(document.getElementById('rawCota').value)">Ver bloque RAW</button></div></div><div id="rawBlock" style="margin-top:14px"></div></section><section class="card"><h2>Diagnóstico de matching</h2><div class="tableWrap"><table><thead><tr><th>Cota</th><th>Inspection</th><th>Tipo</th><th>PC-DMIS usado</th><th>Diagnóstico</th><th>Estado</th></tr></thead><tbody>${rows}</tbody></table></div></section>`;}
render();
</script></body></html>
