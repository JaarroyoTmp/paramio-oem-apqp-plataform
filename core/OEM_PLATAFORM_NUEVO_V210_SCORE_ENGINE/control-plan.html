<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan V210</title><link rel="stylesheet" href="assets/platform.css"><script src="core/storage.js"></script><script src="core/type-normalizer.js"></script><script src="core/parser-inspection.js"></script><script src="core/parser-pcdmis.js"></script><script src="core/validation-engine.js"></script><script src="core/strategies/dimension.js"></script><script src="core/strategies/position.js"></script><script src="core/strategies/profile.js"></script><script src="core/strategies/diameter.js"></script><script src="core/strategies/flatness.js"></script><script src="core/strategies/orientation.js"></script><script src="core/strategies/depth.js"></script><script src="core/strategies/radius.js"></script><script src="core/strategies/thread.js"></script><script src="core/result-engine.js"></script><script src="core/diagnostics-engine.js"></script></head>
<body><div class="app"><script>document.write(renderShell('plan'))</script><main class="main"><header class="top"><div><h1>Plan de control</h1><p>Plan separado. Lee proyecto y KCS, no procesa Excel.</p></div><div class="actions noPrint"><a class="btn light" href="index.html">Cargar Excel</a><button class="btn" onclick="window.print()">Imprimir</button></div></header><div id="root"></div></main></div><script>
let p=loadProject();const root=document.getElementById('root');function instrumentFor(c){const ft=featureType(c);if(ft==='DIAMETER')return'3D / alexómetro / micrómetro 3 contactos';if(['POSITION','PROFILE','ANGULARITY','PARALLELISM','PERPENDICULARITY','FLATNESS','CIRCULARITY','CYLINDRICITY'].includes(ft))return'3D / CMM / informe tridimensional';if(ft==='THREAD')return'Tampón rosca P/NP';if(ft==='RADIUS')return'Plantilla radios / proyector / presetter';if(ft==='DEPTH')return'Profundímetro / CMM';return'Pie de rey / micrómetro / calibre según cota';}function render(){p=loadProject();if(!p||!p.characteristics.length){root.innerHTML=noDataHtml();return;}const m=p.meta||{};const rows=p.characteristics.map(c=>`<tr class="${c.kcs?'kcsRow':''}"><td>20</td><td>MECANIZADO</td><td>Centro mecanizado / torno</td><td>${esc(c.number)}</td><td>${c.kcs?'<span class="typeBadge kcs">⚠ KCS</span>':'<span class="typeBadge">Producto</span>'}</td><td>${esc(featureType(c))}</td><td>${esc(cleanChar(c.value))}</td><td>${specText(c)}</td><td>Medición / control dimensional</td><td>${esc(instrumentFor(c))}</td><td>3</td><td>Inicio + 1h / según pauta</td><td>Producción / Calidad</td><td>Ajustar máquina; bloquear lote; revisar última pieza OK</td></tr>`).join('');root.innerHTML=`<section class="card"><div class="planTitle">PLAN DE CONTROL</div><div class="metaGrid"><div class="lab">Referencia</div><div>${esc(m.reference||'')}</div><div class="lab">Revisión</div><div>${esc(m.revision||'')}</div><div class="lab">Cliente</div><div>${esc(m.client||'')}</div><div class="lab">Pieza</div><div>${esc(m.partName||'')}</div><div class="lab">Fecha</div><div>${esc(m.date||'')}</div><div class="lab">Tipo</div><div>Producción</div></div></section><section class="card"><div class="tableWrap"><table><thead><tr><th>Nº OP</th><th>Descripción operación</th><th>Máquina / útiles</th><th>Globo</th><th>Tipo</th><th>Clase</th><th>Característica / control</th><th>Especificación / tolerancia</th><th>Método</th><th>Instrumento</th><th>Muestra</th><th>Frecuencia</th><th>Realizado por</th><th>Plan reacción</th></tr></thead><tbody><tr class="opHeader"><td colspan="14">OP 20 · MECANIZADO · Cotas desde Inspection</td></tr>${rows}</tbody></table></div></section>`;}render();
</script></body></html>
