<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Diagnóstico Trazable V218</title><link rel="stylesheet" href="assets/platform.css"><script src="core/storage.js"></script><script src="core/type-normalizer.js"></script><script src="core/parser-inspection.js"></script><script src="core/parser-pcdmis.js"></script><script src="core/validation-engine.js"></script><script src="core/strategies/dimension.js"></script><script src="core/strategies/position.js"></script><script src="core/strategies/profile.js"></script><script src="core/strategies/diameter.js"></script><script src="core/strategies/flatness.js"></script><script src="core/strategies/orientation.js"></script><script src="core/strategies/depth.js"></script><script src="core/strategies/radius.js"></script><script src="core/strategies/thread.js"></script><script src="core/result-engine.js"></script><script src="core/diagnostics-engine.js"></script></head>
<body><div class="app"><script>document.write(renderShell('diag'))</script><main class="main"><header class="top"><div><h1>Diagnóstico trazable CORE V218</h1><p>Cada cota queda clasificada: OK, NOK, SIN_BLOQUE_PCDMIS, SIN_MEDIDA_NUMERICA o SIN_REGLA.</p></div><div class="actions noPrint"><a class="btn light" href="index.html">Cargar Excel</a><button class="btn orange" onclick="exportTraceCsv(loadProject(),document.getElementById('pieceGlobal')?.value||'1')">Exportar CSV trazable</button></div></header><div id="root"></div></main></div>
<script>
let p=loadProject();const root=document.getElementById('root');
function rawBlocksFor(cota,piece='1'){return (p&&p.pcdmisRawBlocks&&p.pcdmisRawBlocks[String(piece)]&&p.pcdmisRawBlocks[String(piece)][String(cota)])||[];}
function rowClassByStatus(st){if(st==='OK')return'diagHigh';if(st==='NOK')return'diagLow';if(st==='SIN_REGLA')return'diagMed';return'diagLow';}
function itemLabel(it){return `${it.axis||'-'} ${it.role||''} · fila ${it.rowIndex||''} · D=${it.nominal||''} · E=${it.measured||''} · F=${it.plus||''} · G=${it.minus||''}`;}
function rawRowHtml(r){const usable=Number.isFinite(num(r.D_nominal))&&Number.isFinite(num(r.E_medida));return `<tr class="${r.marker?'diagMed':usable?'diagHigh':'diagLow'}"><td>${esc(r.rowIndex)}</td><td>${esc(r.A)}</td><td>${esc(r.B)}</td><td>${esc(r.C)}</td><td>${esc(r.D_nominal)}</td><td><b>${esc(r.E_medida)}</b></td><td>${esc(r.F_tolPlus)}</td><td>${esc(r.G_tolMinus)}</td><td>${esc(r.H_desv)}</td><td>${esc(r.I_extra)}</td><td><b>${esc(r.axis||'')}</b></td><td>${esc(r.role||'')}</td></tr>`;}
function renderRawBlock(cota){const piece=document.getElementById('pieceGlobal')?.value||'1';const rows=rawBlocksFor(cota,piece);const el=document.getElementById('rawBlock');if(!rows.length){el.innerHTML=`<div class="notice badNotice">No hay RAW guardado para COTA ${esc(cota)} pieza ${esc(piece)}. Clasificación: SIN_BLOQUE_PCDMIS.</div>`;return;}el.innerHTML=`<h3>RAW BLOCK VIEW · COTA ${esc(cota)} · Pieza ${esc(piece)}</h3><div class="notice">Todo lo que hay desde <b>COTA ${esc(cota)}</b> hasta la siguiente COTA. Esto es la verdad base antes del matching.</div><div class="tableWrap"><table><thead><tr><th>Fila</th><th>A</th><th>B</th><th>C</th><th>D nominal</th><th>E medida</th><th>F +</th><th>G -</th><th>H</th><th>I</th><th>Axis</th><th>Role</th></tr></thead><tbody>${rows.map(rawRowHtml).join('')}</tbody></table></div>`;}
function renderTrace(cota){const piece=document.getElementById('pieceGlobal')?.value||'1';const c=(p.characteristics||[]).find(x=>String(x.number)===String(cota));const el=document.getElementById('traceBox');if(!c){el.innerHTML='';return;}const t=traceCharacteristic(c,piece);const selected=(t.displaySelected||t.selected).map(s=>`<li>${esc(itemLabel(s))} · ${esc(s.validation?.status||'')} · ${esc(s.validation?.reason||'')}</li>`).join('')||'<li>Sin fila seleccionada</li>';const discarded=t.discarded.map(d=>`<li>${esc(itemLabel(d))}<br><span class="small">${esc(d.discardReason)}</span></li>`).join('')||'<li>Sin descartes numéricos</li>';el.innerHTML=`<section class="card"><h2>Trazabilidad COTA ${esc(t.balloon)} · ${esc(t.status)}</h2><div class="grid"><div><b>Tipo Inspection</b><br>${esc(t.inspectionType)}</div><div><b>Strategy</b><br>${esc(t.strategy)}</div><div><b>Confianza</b><br>${esc(t.confidence)}</div><div><b>Modo validación</b><br>${esc(t.validationMode)}</div></div><p><b>Regla:</b> ${esc(t.rule)}</p><p><b>Motivo:</b> ${esc(t.reason)}</p><h3>Seleccionadas</h3><ul>${selected}</ul><h3>Descartadas</h3><ul>${discarded}</ul></section>`;renderRawBlock(cota);}
function render(){p=loadProject();if(!p||!p.characteristics.length){root.innerHTML=noDataHtml();return;}const piece=(pieceLabels(p)[0]||'1');const summary=diagnosticSummary(p,piece);const opts=p.characteristics.map(c=>`<option value="${esc(c.number)}">${esc(c.number)} · ${esc(cleanChar(c.value)).slice(0,70)}</option>`).join('');const rows=summary.traces.map(t=>{const c=(p.characteristics||[]).find(x=>String(x.number)===String(t.balloon))||{};return `<tr class="${rowClassByStatus(t.status)}"><td><button class="btn light" onclick="document.getElementById('rawCota').value='${esc(t.balloon)}';renderTrace('${esc(t.balloon)}')">${esc(t.balloon)}</button></td><td>${esc(c.value||'')}</td><td><b>${esc(t.inspectionType)}</b></td><td><b>${esc(t.status)}</b><br>${esc(t.reason)}</td><td>${esc(t.confidence)}</td><td>${(t.displaySelected||t.selected).map(itemLabel).map(esc).join('<br>')||'Sin selección'}</td><td>${statusPill(pieceStatus(c,piece))}</td></tr>`}).join('');root.innerHTML=`<section class="card noPrint"><div class="grid"><div><label>Pieza global</label><input id="pieceGlobal" value="${esc(piece)}" onchange="render()"></div><div><label>Cota</label><select id="rawCota">${opts}</select></div><div style="display:flex;align-items:end"><button class="btn green" onclick="renderTrace(document.getElementById('rawCota').value)">Ver trazabilidad</button></div></div></section><section class="card"><div class="statGrid"><div class="stat"><b>${summary.total}</b><span>Cotas</span></div><div class="stat"><b>${summary.ok}</b><span>OK</span></div><div class="stat"><b>${summary.nok}</b><span>NOK</span></div><div class="stat"><b>${summary.pending}</b><span>Pendientes clasificados</span></div><div class="stat"><b>${summary.sinBloque}</b><span>SIN_BLOQUE</span></div><div class="stat"><b>${summary.sinRegla}</b><span>SIN_REGLA</span></div></div></section><div id="traceBox"></div><section class="card"><h2>Diagnóstico por cota</h2><div class="tableWrap"><table><thead><tr><th>Cota</th><th>Inspection</th><th>Tipo</th><th>Diagnóstico</th><th>Confianza</th><th>PC-DMIS usado</th><th>Estado</th></tr></thead><tbody>${rows}</tbody></table></div></section><section class="card"><div id="rawBlock"></div></section>`;}
render();
</script>

  const SKIP_TAGS = new Set(["SCRIPT","STYLE","NOSCRIPT","TEXTAREA"]);
  const INPUT_TYPES_TO_TRANSLATE = new Set(["button","submit","reset"]);

  function sortedKeys(){
    return Object.keys(DICT).sort((a,b)=>b.length-a.length);
  }

  function looksTechnicalOnly(txt){
    const t = String(txt || "").trim();
    if(!t) return true;
    if(/^[-+0-9.,/ %:;()ØA-Z_]+$/.test(t) && !/[a-záéíóúñü]/i.test(t.replace(/[A-Z]/g,''))) return true;
    if(/^CE\d+|^[A-Z]{1,4}\d{2,}/.test(t)) return true;
    return false;
  }

  function translateString(original, lang){
    if(lang === "es") return original;
    let txt = String(original);
    for(const es of sortedKeys()){
      const en = DICT[es];
      txt = txt.split(es).join(en);
      txt = txt.split(es.toUpperCase()).join(String(en).toUpperCase());
    }
    return txt;
  }

  function translateTextNode(node, lang){
    const parent = node.parentElement;
    if(!parent || SKIP_TAGS.has(parent.tagName)) return;
    const val = node.nodeValue;
    if(!val || !val.trim()) return;
    if(looksTechnicalOnly(val)) return;
    if(!node.__paramioOriginalText) node.__paramioOriginalText = val;
    node.nodeValue = translateString(node.__paramioOriginalText, lang);
  }

  function translateAttributes(el, lang){
    ["placeholder","title","aria-label","alt"].forEach(attr=>{
      if(!el.hasAttribute || !el.hasAttribute(attr)) return;
      const key = "__paramioOriginal_" + attr;
      if(!el[key]) el[key] = el.getAttribute(attr);
      el.setAttribute(attr, translateString(el[key], lang));
    });

    if(el.tagName === "INPUT" && INPUT_TYPES_TO_TRANSLATE.has((el.type||"").toLowerCase())){
      if(!el.__paramioOriginalValue) el.__paramioOriginalValue = el.value;
      el.value = translateString(el.__paramioOriginalValue, lang);
    }
  }

  function walk(lang){
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        const p = node.parentElement;
        if(!p || SKIP_TAGS.has(p.tagName)) return NodeFilter.FILTER_REJECT;
        if(!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_SKIP;
        if(looksTechnicalOnly(node.nodeValue)) return NodeFilter.FILTER_SKIP;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes=[];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(n=>translateTextNode(n, lang));

    document.querySelectorAll("*").forEach(el=>translateAttributes(el, lang));
    document.querySelectorAll("option").forEach(op=>{
      if(!op.__paramioOriginalText) op.__paramioOriginalText = op.textContent;
      op.textContent = translateString(op.__paramioOriginalText, lang);
    });

    document.querySelectorAll(".paramio-lang-switch button").forEach(b=>b.classList.toggle("active", b.dataset.lang===lang));
  }

  function observe(){
    if(window.__paramioV250Observer) return;
    window.__paramioV250Observer = new MutationObserver(function(){
      clearTimeout(window.__paramioV250Timer);
      window.__paramioV250Timer = setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 120);
    });
    window.__paramioV250Observer.observe(document.body, {childList:true, subtree:true, characterData:true});
  }

  function makeSwitch(){
    if(document.getElementById("paramioLangSwitch")) return;
    const box = document.createElement("div");
    box.id="paramioLangSwitch";
    box.className="paramio-lang-switch";
    box.innerHTML='<strong style="font-size:12px;margin:0 4px">LANG</strong><button data-lang="es">ES</button><button data-lang="en">EN</button>';
    document.body.appendChild(box);
    box.querySelectorAll("button").forEach(btn=>{
      btn.addEventListener("click",()=>{
        localStorage.setItem("paramio_doc_lang",btn.dataset.lang);
        walk(btn.dataset.lang);
      });
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    makeSwitch();
    const lang = localStorage.getItem("paramio_doc_lang") || "es";
    walk(lang);
    observe();
    setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 500);
    setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 1500);
  });

  window.paramioSetLanguage = function(lang){
    localStorage.setItem("paramio_doc_lang",lang);
    walk(lang);
  };
  window.paramioTranslateNow = function(){ walk(localStorage.getItem("paramio_doc_lang") || "es"); };
})();
</script>
