<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ISIR V223</title><link rel="stylesheet" href="assets/platform.css"><script src="core/storage.js"></script><script src="core/type-normalizer.js"></script><script src="core/parser-inspection.js"></script><script src="core/parser-pcdmis.js"></script><script src="core/validation-engine.js"></script><script src="core/strategies/dimension.js"></script><script src="core/strategies/position.js"></script><script src="core/strategies/profile.js"></script><script src="core/strategies/diameter.js"></script><script src="core/strategies/flatness.js"></script><script src="core/strategies/orientation.js"></script><script src="core/strategies/depth.js"></script><script src="core/strategies/radius.js"></script><script src="core/strategies/thread.js"></script><script src="core/result-engine.js"></script>
<script id="paramio-inline-result-engine">
(function(){
  window.specText=function(c){return`LI ${esc(c.lower??'')} / LS ${esc(c.upper??'')} ${esc(c.units||'')}`;};
  window.isKcs=function(c){return !!(c&&c.kcs);};
  function cleanUpper(v){return String(v??'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,' ').replace(/\s+/g,' ').trim();}
  function measured(it){return String(it?.measured??it?.value??it?.reportValue??it?.E_medida??'').trim();}
  window.measured=measured;

  window.pcText=function(it){
    return [it?.name,it?.desc,it?.label,it?.type,it?.kind,it?.axis,it?.role,it?.rawText,(it?.raw||[]).join(' ')]
      .map(x=>String(x||'')).join(' ').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,' ');
  };

  window.axisOf=function(it){
    const ax=norm(it?.axis||it?.kind||'');
    if(ax)return ax;
    const t=pcText(it);
    if(/\b2D\b/.test(t))return'2D';
    if(/\b3D\b/.test(t))return'3D';
    if(/\bTP\b|TRUE\s*POSITION/.test(t))return'TP';
    if(/PERFIL|PROFILE/.test(t))return'PROFILE';
    if(/PLANITUD|FLATNESS/.test(t))return'FLATNESS';
    if(/ANGULAR|ANGULO|ANGLE/.test(t))return'ANGULARITY';
    if(/PARALEL|PARALLEL/.test(t))return'PARALLELISM';
    if(/PERPENDIC/.test(t))return'PERPENDICULARITY';
    if(/PROFUNDIDAD|DEPTH/.test(t))return'DEPTH';
    if(/RADIO|RADIUS/.test(t))return'RADIUS';
    if(/\bDF\b/.test(t))return'DF';
    if(/\bD\d*\b|DIAM/.test(t))return'D';
    if(/\bX\b/.test(t))return'X';
    if(/\bY\b/.test(t))return'Y';
    if(/\bZ\b/.test(t))return'Z';
    if(/\bM\b|DISTANCE|DIMENSION\s*M/.test(t))return'M';
    return'';
  };

  window.featureType=function(c){return normalizeFeatureType(c?.featureType||c?.rawValue||c?.decodedValue||c?.value||'');};

  window.dedupItems=function(items){
    const seen=new Set();
    return (items||[]).filter(it=>{
      const key=[axisOf(it),it.role||'',it.nominal||'',measured(it),it.name||'',it.desc||'',it.rowIndex||''].join('|');
      if(seen.has(key))return false;
      seen.add(key);
      return true;
    });
  };

  function itemBelongsToCota(it,c){
    const wanted=String(c.number??c.balloon??'').trim();
    const got=String(it.cota??it.blockCota??it.globo??it.charNumber??'').trim();
    return !got||got===wanted;
  }

  function usableItems(c,items){
    return (Array.isArray(items)?items:[])
      .filter(it=>itemBelongsToCota(it,c))
      .map(it=>Object.assign({},it,{_axis:axisOf(it),_pcText:pcText(it),_measured:measured(it)}));
  }

  function numericUsableItems(c,items){
    return usableItems(c,items).filter(it=>it._measured&&Number.isFinite(num(it._measured)));
  }

  function strategyName(c){return featureType(c)||'DIMENSION';}

  function isRealTpPositionRow(it){
    const colC=String(it?.C||it?.raw?.[2]||'').trim().toUpperCase();
    const name=String(it?.name||it?.A||it?.raw?.[0]||'').trim().toUpperCase();
    const desc=String(it?.desc||it?.B||it?.raw?.[1]||'').trim().toUpperCase();
    const t=pcText(it);
    // V218 REGLA CERRADA: TP real solamente.
    // NO usar axis/kind inferidos, porque el parser puede marcar POSITION por descripcion.
    // Se acepta si la columna C es TP, si la fila empieza por TP, o TRUE POSITION literal.
    if(['X','Y','Z','D','DF','D1','D2','2D','3D','PA','PR','M'].includes(colC))return false;
    if(colC==='TP')return true;
    if(/^TP(\s|_|-|$)/.test(name))return true;
    if(/^TP(\s|_|-|$)/.test(desc))return true;
    if(/TRUE\s*POSITION/.test(t))return true;
    return false;
  }

  function runStrategy(c,items){
    const ft=strategyName(c);
    const strategy=(window.ParamioStrategies||{})[ft]||(window.ParamioStrategies||{}).DIMENSION;
    if(!strategy)return [];
    return dedupItems(strategy(c,items)||[]);
  }

  function expectedRuleText(ft){
    const rules={
      DIMENSION:'Acepta X/Y/Z/D/M/DISTANCE/DIMENSION M. Valida nominal +/- tolerancia.',
      POSITION:'Acepta solo TP real / TRUE POSITION. Descarta X/Y/Z/D/2D/3D POSITION aunque el texto diga posicion.',
      PROFILE:'Acepta PROFILE/PERFIL y LOCATION asociadas. Valida 0 <= valor <= tolerancia.',
      DIAMETER:'Acepta D/DF/D LOCATION/DIAMETER/Ø. Nunca acepta TP.',
      FLATNESS:'Acepta FLATNESS/PLANITUD. Valida 0 <= valor <= tolerancia.',
      ANGULARITY:'Acepta solo error geométrico de angularidad dentro de tolerancia. Descarta valores auxiliares de angulo/ubicacion.',
      PARALLELISM:'Acepta PARALLELISM/PARALELISMO o fallback controlado M nominal 0. Valida geométrica.',
      PERPENDICULARITY:'Acepta PERPENDICULARITY/PERPENDICULARIDAD o fallback controlado M nominal 0. Valida geométrica.',
      DEPTH:'Acepta DEPTH/PROFUNDIDAD.',
      RADIUS:'Acepta RADIUS/RADIO/R.',
      THREAD:'Acepta THREAD/ROSCA/Mxx.'
    };
    return rules[ft]||'Tipo sin regla documentada: revisar strategy.';
  }

  function itemSummary(it){
    const validation=window.validateMeasurement?validateMeasurement(window.__traceCurrentCharacteristic||{},it):null;
    return {
      rowIndex:it.rowIndex||'',
      axis:axisOf(it)||'',
      role:it.role||'',
      name:it.name||it.A||'',
      desc:it.desc||it.B||'',
      nominal:it.nominal||it.D_nominal||'',
      measured:measured(it),
      plus:it.plus||it.F_tolPlus||'',
      minus:it.minus||it.G_tolMinus||'',
      text:pcText(it).slice(0,220),
      validation,
      semanticScore:it.semanticScore||'',
      semanticBlock:it.semanticBlock||'',
      adjustmentReason:it.adjustmentReason||''
    };
  }

  function explainDiscard(c,it,selectedKeys){
    const ft=strategyName(c), ax=axisOf(it), t=pcText(it), val=measured(it);
    const key=[ax,it.role||'',it.nominal||'',val,it.name||'',it.desc||'',it.rowIndex||''].join('|');
    if(selectedKeys.has(key))return 'SELECCIONADA';
    if(!val||!Number.isFinite(num(val)))return 'Descartada: sin medida numérica en columna E.';
    if(ft==='POSITION'){
      if(!isRealTpPositionRow(it))return 'Descartada POSITION: no es TP/TRUE POSITION real.';
      return 'Descartada POSITION: candidata duplicada o filtrada por deduplicación.';
    }
    if(ft==='DIAMETER'){
      if(ax==='TP'||/TRUE\s*POSITION|POSICION/.test(t))return 'Descartada DIAMETER: fila de posición, no diámetro.';
      if(!(['D','DF'].includes(ax)||/[Ø⌀]|DIAM|UBICACION\s*D|LOCATION\s*D|\bD\s*LOCATION/.test(t)))return 'Descartada DIAMETER: no es D/DF/DIAMETER.';
    }
    if(ft==='DIMENSION'){
      if(['TP','DF','PA','PR','2D','3D','PROFILE','FLATNESS','ANGULARITY','PARALLELISM','PERPENDICULARITY'].includes(ax))return 'Descartada DIMENSION: eje/tipo reservado para geométrica.';
      if(/TRUE\s*POSITION|POSICION|POSITION|PROFILE|PERFIL|FLATNESS|PLANITUD/.test(t))return 'Descartada DIMENSION: texto geométrico.';
      const a=num(c.nominal),b=num(it.nominal);
      if(Number.isFinite(a)&&Number.isFinite(b)&&Math.abs(a-b)>0.01)return 'Descartada DIMENSION: nominal Inspection no coincide con nominal PC-DMIS.';
      return 'Descartada DIMENSION: no cumple patrón dimensional útil.';
    }
    if(ft==='PROFILE'){
      if(/LOCATION|UBICACION/.test(t))return 'Descartada PROFILE: ubicacion asociada, no valor primario de perfil.';
      return 'Descartada PROFILE: no es fila PROFILE/PERFIL primaria.';
    }
    if(isGeometricType(ft)){
      if(['X','Y','Z','D','DF'].includes(ax))return 'Descartada geométrica: fila auxiliar/eje, no valor primario de tolerancia.';
      return 'Descartada geométrica: no cumple patrón directo ni fallback controlado.';
    }
    return 'Descartada: no cumple la strategy '+ft+'.';
  }

  function buildTrace(c,items,piece){
    const ft=strategyName(c);
    const all=usableItems(c,items);
    const numeric=numericUsableItems(c,items);
    window.__traceCurrentCharacteristic=c;
    const selected=runStrategy(c,numeric);
    const selectedKeys=new Set(selected.map(it=>[axisOf(it),it.role||'',it.nominal||'',measured(it),it.name||'',it.desc||'',it.rowIndex||''].join('|')));
    const validations=selected.map(it=>validateMeasurement(c,it));
    let status='SIN_REGLA', reason='Existe bloque COTA pero ninguna fila cumple strategy '+ft, confidence='LOW';
    if(!all.length){status='SIN_BLOQUE_PCDMIS';reason='No existe bloque PC-DMIS ni candidato semantico para COTA '+(c.number??c.balloon);confidence='NONE';}
    else if(!numeric.length){status='SIN_MEDIDA_NUMERICA';reason='Existe bloque pero no hay filas con medida numérica en columna E.';confidence='LOW';}
    else if(selected.length){
      const bad=validations.find(v=>!v.ok);
      status=bad?'NOK':'OK';
      reason=bad?bad.reason:'Match '+ft+' validado correctamente.';
      confidence=selected.some(it=>it.semanticFallback)?(selected.some(it=>it.semanticAmbiguous)?'LOW':'MEDIUM'):(selected.length===1?'HIGH':'MEDIUM');
    }
    const discarded=numeric.filter(it=>!selectedKeys.has([axisOf(it),it.role||'',it.nominal||'',measured(it),it.name||'',it.desc||'',it.rowIndex||''].join('|')))
      .map(it=>Object.assign(itemSummary(it),{discardReason:explainDiscard(c,it,selectedKeys)}));
    const displaySelected=(ft==='PROFILE')
      ? selected.concat(numeric.filter(isProfileLocationContext).filter(it=>!selectedKeys.has([axisOf(it),it.role||'',it.nominal||'',measured(it),it.name||'',it.desc||'',it.rowIndex||''].join('|'))))
      : selected;
    return {
      balloon:String(c.number??c.balloon??''),
      piece:String(piece??'1'),
      inspectionType:ft,
      strategy:ft,
      rule:expectedRuleText(ft),
      status,
      reason,
      confidence,
      validationMode:isGeometricType(ft)?'GEOMETRIC_0_TO_TOL':'DIMENSIONAL_NOMINAL_TOL',
      candidatesFound:numeric.length,
      selectedCount:selected.length,
      selected:selected.map(it=>itemSummary(it)),
      displaySelected:displaySelected.map(it=>itemSummary(it)),
      discarded,
      allRows:all.map(it=>itemSummary(it))
    };
  }

  window.traceCharacteristic=function(c,piece='1'){
    const items=allItems(c,piece);
    return buildTrace(c,items,piece);
  };

  window.traceProject=function(p,piece='1'){
    p=p||loadProject();
    if(!p)return [];
    return (p.characteristics||[]).map(c=>traceCharacteristic(c,piece));
  };

  function exactResultItems(c,piece){
    const r=(c.results||{})[piece]||(c.results||{})['P'+piece]||null;
    if(!r)return[];
    if(Array.isArray(r.rawItems))return r.rawItems;
    if(Array.isArray(r.items))return r.items;
    return[];
  }

  function tolValue(c){
    const ft=featureType(c);
    if(isGeometricType(ft)){const up=Math.abs(num(c.upper));return Number.isFinite(up)?up:NaN;}
    const n=num(c.nominal), up=num(c.upper), lo=num(c.lower);
    if(Number.isFinite(n)&&Number.isFinite(up)&&Number.isFinite(lo))return Math.max(Math.abs(up-n),Math.abs(n-lo));
    return NaN;
  }

  function groupByBlock(items){
    const m={};
    (items||[]).forEach(it=>{const k=String(it.blockCota||it.cota||'SIN_BLOQUE');(m[k]=m[k]||[]).push(it);});
    return m;
  }

  function inspectionTolAbs(c){
    const ft=featureType(c);
    if(isGeometricType(ft)){
      const vals=[c.upper,c.tolerance?.upper,c.tolerance].map(num).map(Math.abs).filter(Number.isFinite);
      return vals.length?Math.max(...vals):NaN;
    }
    const n=num(c.nominal), lo=num(c.lower), up=num(c.upper);
    if(Number.isFinite(n)&&Number.isFinite(lo)&&Number.isFinite(up))return Math.max(Math.abs(up-n),Math.abs(n-lo));
    const vals=[c.upper,c.lower,c.tolerance?.upper,c.tolerance].map(num).map(Math.abs).filter(Number.isFinite);
    return vals.length?Math.max(...vals):NaN;
  }

  function dimBoundsFromInspection(c,extra){
    const n=num(c.nominal), tol=inspectionTolAbs(c);
    if(!Number.isFinite(n)||!Number.isFinite(tol))return null;
    const m=Math.max(extra||0,tol*0.25,0.02);
    return {lower:n-tol-m,upper:n+tol+m,nominal:n,tolerance:tol};
  }

  function rowLooksDimensional(it){
    const ax=axisOf(it),t=pcText(it);
    if(['TP','DF','PA','PR','2D','3D','PROFILE','FLATNESS','ANGULARITY','PARALLELISM','PERPENDICULARITY','CIRCULARITY','CYLINDRICITY'].includes(ax))return false;
    if(/TRUE\s*POSITION|POSICION|\bPOSITION\b|PROFILE|PERFIL|FLATNESS|PLANITUD|ANGULAR|PARALLEL|PERPENDIC/.test(t))return false;
    return ['X','Y','Z','D','M',''].includes(ax)||/LOCATION|UBICACION|DISTANCE|DIMENSION\s*M|MEDIDA/.test(t);
  }

  function rowTypeCompatible(c,it){
    const ft=strategyName(c), ax=axisOf(it), t=pcText(it);
    if(ft==='DIMENSION')return rowLooksDimensional(it);
    if(ft==='POSITION')return isRealTpPositionRow(it);
    if(ft==='PROFILE')return ax==='PROFILE'||/PROFILE|PERFIL/.test(t);
    if(ft==='DIAMETER')return ['D','DF'].includes(ax)||/[Ø⌀]|DIAM|UBICACION\s*D|LOCATION\s*D|\bD\s*LOCATION/.test(t);
    if(ft==='FLATNESS')return ax==='FLATNESS'||/FLATNESS|PLANITUD/.test(t);
    if(ft==='ANGULARITY')return ax==='ANGULARITY'||/ANGULARITY|ANGULARIDAD|ANGULO|ANGLE/.test(t)||(ax==='M'&&Math.abs(num(it.nominal))<1e-9);
    if(ft==='PARALLELISM')return ax==='PARALLELISM'||/PARALLELISM|PARALELISMO|PARALEL/.test(t)||(ax==='M'&&Math.abs(num(it.nominal))<1e-9);
    if(ft==='PERPENDICULARITY')return ax==='PERPENDICULARITY'||/PERPENDICULARITY|PERPENDICULARIDAD|PERPENDIC/.test(t)||(ax==='M'&&Math.abs(num(it.nominal))<1e-9);
    if(ft==='DEPTH')return ax==='DEPTH'||/DEPTH|PROFUNDIDAD/.test(t);
    if(ft==='RADIUS')return ax==='RADIUS'||/RADIUS|RADIO|\bR\b/.test(t);
    if(ft==='THREAD')return /THREAD|ROSCA|\bM\d+/.test(t);
    return false;
  }

  function scoreCandidate(c,it){
    if(!it||!Number.isFinite(num(measured(it))))return -999;
    if(!rowTypeCompatible(c,it))return -999;
    const ft=strategyName(c), ax=axisOf(it), v=num(measured(it)), n=num(c.nominal), pcNom=num(it.nominal), tol=inspectionTolAbs(c), t=pcText(it);
    let score=50;
    if(it.blockCota&&String(it.blockCota)===String(c.number??c.balloon??''))score+=25;
    if(ft==='DIMENSION'){
      const b=dimBoundsFromInspection(c,0);
      if(b&&v>=b.lower&&v<=b.upper)score+=45;
      if(Number.isFinite(n)&&Number.isFinite(pcNom)&&Math.abs(n-pcNom)<=Math.max(0.01,Math.abs(n)*0.0005))score+=35;
      if(Number.isFinite(n)&&Number.isFinite(pcNom)&&Math.abs(pcNom)<1e-9&&b&&v>=b.lower&&v<=b.upper)score+=30;
      if(['X','Y','Z','D','M'].includes(ax))score+=10;
      if(/DISTANCE|DIMENSION\s*M/.test(t))score+=8;
      const p=Math.abs(num(it.plus)); if(Number.isFinite(p)&&Number.isFinite(tol)&&Math.abs(p-tol)<=Math.max(0.005,tol*0.15))score+=12;
    }else if(isGeometricType(ft)){
      const limit=tol;
      if(Number.isFinite(limit)&&v>=-1e-9&&v<=limit+1e-9)score+=35;
      if(ft==='POSITION'&&isRealTpPositionRow(it))score+=40;
      if(ft==='PROFILE'&&/PROFILE|PERFIL/.test(t))score+=45;
      if(ft==='FLATNESS'&&/FLATNESS|PLANITUD/.test(t))score+=35;
      if(['ANGULARITY','PARALLELISM','PERPENDICULARITY'].includes(ft)&&ax===ft)score+=35;
      const p=Math.abs(num(it.plus)); if(Number.isFinite(p)&&Number.isFinite(limit)&&Math.abs(p-limit)<=Math.max(0.005,limit*0.20))score+=15;
    }else{
      score+=10;
    }
    return score;
  }

  function normalizeCandidateForStrategy(c,it){
    const ft=strategyName(c);
    if(ft==='DIMENSION'&&rowLooksDimensional(it)){
      const clone=Object.assign({},it);
      const b=dimBoundsFromInspection(c,0);
      const v=num(measured(it)), pcNom=num(it.nominal), cn=num(c.nominal);
      if(b&&Number.isFinite(v)&&v>=b.lower&&v<=b.upper&&(!Number.isFinite(pcNom)||Math.abs(pcNom-cn)>Math.max(0.01,Math.abs(cn)*0.0005))){
        clone.originalNominal=it.nominal;
        clone.nominal=String(c.nominal??it.nominal??'');
        clone.semanticAdjusted=true;
        clone.adjustmentReason='Score engine: medida E compatible con nominal/tolerancia Inspection';
      }
      return clone;
    }
    return it;
  }

  function scoreBlockForCharacteristic(c,items){
    const numeric=(items||[]).filter(it=>Number.isFinite(num(measured(it))));
    if(!numeric.length)return -999;
    const scores=numeric.map(it=>scoreCandidate(c,it)).filter(x=>x>-999);
    if(!scores.length)return -999;
    return Math.max(...scores)+Math.min(scores.length,4)*3;
  }

  function semanticFallbackItems(c,piece){
    const p=loadProject&&loadProject();
    const pool=p?.pcdmisGlobalItems?.[String(piece)]||p?.pcdmisGlobalItems?.['P'+piece]||[];
    if(!pool.length)return [];
    const groups=groupByBlock(pool);
    const ranked=Object.entries(groups).map(([block,items])=>({block,items,score:scoreBlockForCharacteristic(c,items)})).filter(x=>x.score>-999).sort((a,b)=>b.score-a.score);
    if(!ranked.length)return [];
    const best=ranked[0];
    const second=ranked[1];
    const topRows=best.items
      .map(it=>({it,score:scoreCandidate(c,it)}))
      .filter(x=>x.score>-999)
      .sort((a,b)=>b.score-a.score);
    const rows=(topRows.length?topRows.map(x=>x.it):best.items).map(it=>normalizeCandidateForStrategy(c,Object.assign({},it,{semanticFallback:true,semanticBlock:best.block,semanticScore:best.score,semanticAmbiguous:!!(second&&Math.abs(second.score-best.score)<=3)})));
    return rows;
  }

  window.allItems=function(c,piece){
    const exact=exactResultItems(c,piece);
    const fallback=semanticFallbackItems(c,piece);
    if(!exact.length)return fallback;
    if(!fallback.length)return exact;

    const exactSelected=runStrategy(c,numericUsableItems(c,exact));
    const fallbackSelected=runStrategy(c,numericUsableItems(c,fallback));
    const exactOk=exactSelected.some(it=>validateMeasurement(c,it).ok);
    const fallbackOk=fallbackSelected.some(it=>validateMeasurement(c,it).ok);
    const exactScore=scoreBlockForCharacteristic(c,exact);
    const fallbackScore=scoreBlockForCharacteristic(c,fallback);

    // V212: no bloquearse en el bloque numerico si hay una coincidencia semantica mucho mejor.
    if(fallbackSelected.length && (!exactSelected.length || (!exactOk&&fallbackOk) || fallbackScore>exactScore+20))return fallback;
    return exact;
  };

  window.pieceResult=function(c,piece){return(c.results||{})[piece]||(c.results||{})['P'+piece]||null;};
  window.manualValue=function(c,piece){const p=loadProject();return p?.manualResults?.[String(c.number)]?.[String(piece)]||'';};
  window.setManual=function(n,piece,val){const p=loadProject();p.manualResults=p.manualResults||{};p.manualResults[String(n)]=p.manualResults[String(n)]||{};p.manualResults[String(n)][String(piece)]=val;saveProject(p);};

  window.pieceLabels=function(p){
    const set=new Set();
    (p.characteristics||[]).forEach(c=>Object.keys(c.results||{}).forEach(k=>set.add(String(k).replace(/^P/i,''))));
    Object.values(p.manualResults||{}).forEach(byPiece=>Object.keys(byPiece||{}).forEach(k=>set.add(String(k).replace(/^P/i,''))));
    return [...set].sort((a,b)=>(parseInt(a.replace(/\D/g,''))||0)-(parseInt(b.replace(/\D/g,''))||0));
  };

  window.selectedPieces=function(p,fixedTwo){
    const labels=pieceLabels(p);
    if(fixedTwo)return['1','2'];
    const n=parseInt(localStorage.getItem('paramio_piece_count')||'',10);
    if(Number.isFinite(n)&&n>0)return Array.from({length:n},(_,i)=>String(i+1));
    return labels.length?labels:['1'];
  };

  window.piecesControl=function(p){
    const labels=pieceLabels(p);const max=labels.length||2;
    return`<label>Nº piezas documento <input id="pieceCount" type="number" min="1" value="${esc(localStorage.getItem('paramio_piece_count')||max)}" onchange="localStorage.setItem('paramio_piece_count',this.value);render()"></label><span class="small">Detectadas: ${esc(labels.join(', ')||'sin registros')}</span>`;
  };

  window.chooseReportItems=function(c,items){
    const usable=numericUsableItems(c,items);
    return runStrategy(c,usable);
  };

  function itemKeyForDisplay(it){return [axisOf(it),it.role||'',it.nominal||'',measured(it),it.name||'',it.desc||'',it.rowIndex||''].join('|');}

  function isProfileLocationContext(it){
    const ax=axisOf(it), t=pcText(it);
    if(!measured(it)||!Number.isFinite(num(measured(it))))return false;
    if(['TP','PROFILE','FLATNESS','ANGULARITY','PARALLELISM','PERPENDICULARITY'].includes(ax))return false;
    return /LOCATION|UBICACION|UBICACI[OÓ]N/.test(t)&&['X','Y','Z','D','DF',''].includes(ax);
  }

  // V215: separación entre filas que VALIDAN y filas que se MUESTRAN.
  // - POSITION valida y muestra SOLO TP.
  // - PROFILE valida SOLO M/PROFILE, pero muestra también ubicaciones LOCATION asociadas si existen.
  window.displayItemsFor=function(c,piece){
    const ft=featureType(c);
    const all=numericUsableItems(c,allItems(c,piece));
    let primary=chooseReportItems(c,all);
    // V218: blindaje final de render. Aunque una strategy antigua seleccione mal,
    // ISIR no puede mostrar auxiliares de POSITION ni orientación.
    if(ft==='POSITION')primary=primary.filter(isRealTpPositionRow);
    if(['ANGULARITY','PARALLELISM','PERPENDICULARITY'].includes(ft)){
      const lim=inspectionTolAbs(c);
      primary=primary.filter(it=>{const v=num(measured(it)); return Number.isFinite(v)&&(!Number.isFinite(lim)||(v>=-1e-9&&v<=lim+1e-9));});
    }
    if(ft!=='PROFILE')return primary;
    const keys=new Set(primary.map(itemKeyForDisplay));
    const ctx=all.filter(isProfileLocationContext).filter(it=>{const k=itemKeyForDisplay(it); if(keys.has(k))return false; keys.add(k); return true;});
    return primary.concat(ctx);
  };

  window.resultValues=function(c,piece){return displayItemsFor(c,piece).map(measured).filter(Boolean);};
  window.itemOk=function(c,it){return validateMeasurement(c,it).ok;};

  window.pieceStatus=function(c,piece){
    const r=pieceResult(c,piece);const mv=manualValue(c,piece);
    if(!r&&String(mv||'').trim())return'MANUAL';
    if(!r)return'PEND.';
    const tr=traceCharacteristic(c,piece);
    if(tr.status==='OK')return'OK';
    if(tr.status==='NOK')return'NOK';
    return String(mv||'').trim()?'MANUAL':'PEND.';
  };

  window.statusOf=function(c){
    const p=loadProject();const pieces=pieceLabels(p||{characteristics:[c]});
    if(!pieces.length)return'PEND.';
    const sts=pieces.map(piece=>pieceStatus(c,piece));
    if(sts.includes('NOK'))return'NOK';
    if(sts.includes('OK'))return'OK';
    if(sts.includes('MANUAL'))return'MANUAL';
    return'PEND.';
  };

  window.resultCell=function(c,piece){
    const autoVals=resultValues(c,piece);const mv=manualValue(c,piece);
    const vals=mv!==''?String(mv).split(/\n|\/|;/).map(x=>x.trim()).filter(Boolean):autoVals;
    const st=pieceStatus(c,piece);const red=st==='NOK'?' nokVal':'';
    if(vals.length){return`<div class="resultStack">${vals.map(v=>`<input class="manualInput${red} ${mv!==''?'override':''}" value="${esc(v)}" onchange="const arr=Array.from(this.closest('.resultStack').querySelectorAll('input')).map(x=>x.value).filter(Boolean);setManual('${esc(c.number)}','${esc(piece)}',arr.join('\\n'))">`).join('')}</div>`;}
    return`<div class="resultStack"><input class="manualInput manualEmpty" value="" placeholder="Manual" onchange="setManual('${esc(c.number)}','${esc(piece)}',this.value)"></div>`;
  };

  window.statusPill=function(st){const cls=st==='NOK'?'nok':(st==='PEND.'?'warn':'');return`<span class="pill ${cls}">${esc(st)}</span>`;};
  window.filterRows=function(chars){const q=(document.getElementById('filter')?.value||window.__lastFilter||'').toLowerCase();if(!q)return chars;return chars.filter(c=>[c.number,cleanChar(c.value),c.nominal,c.lower,c.upper,c.units,statusOf(c),featureType(c)].join(' ').toLowerCase().includes(q));};

  window.diagFor=function(c,piece='1'){
    const tr=traceCharacteristic(c,piece);
    const legacyStatus=tr.status==='OK'||tr.status==='NOK'?'OK_LINK':tr.status;
    return {status:legacyStatus,traceStatus:tr.status,reason:tr.reason,items:tr.selected.length?tr.selected:tr.allRows,trace:tr};
  };
})();

</script>

  const SKIP_TAGS = new Set(["SCRIPT","STYLE","NOSCRIPT","TEXTAREA"]);
  const INPUT_TYPES_TO_TRANSLATE = new Set(["button","submit","reset"]);

  function sortedKeys(){
    return Object.keys(DICT).sort((a,b)=>b.length-a.length);
  }

  function looksTechnicalOnly(txt){
    const t = String(txt || "").trim();
    if(!t) return true;
    if(/^[-+0-9.,/ %:;()ØA-Z_]+$/.test(t) && !/[a-záéíóúñü]/i.test(t.replace(/[A-Z]/g,''))) return true;
    if(/^CE\d+|^[A-Z]{1,4}\d{2,}/.test(t)) return true;
    return false;
  }

  function translateString(original, lang){
    if(lang === "es") return original;
    let txt = String(original);
    for(const es of sortedKeys()){
      const en = DICT[es];
      txt = txt.split(es).join(en);
      txt = txt.split(es.toUpperCase()).join(String(en).toUpperCase());
    }
    return txt;
  }

  function translateTextNode(node, lang){
    const parent = node.parentElement;
    if(!parent || SKIP_TAGS.has(parent.tagName)) return;
    const val = node.nodeValue;
    if(!val || !val.trim()) return;
    if(looksTechnicalOnly(val)) return;
    if(!node.__paramioOriginalText) node.__paramioOriginalText = val;
    node.nodeValue = translateString(node.__paramioOriginalText, lang);
  }

  function translateAttributes(el, lang){
    ["placeholder","title","aria-label","alt"].forEach(attr=>{
      if(!el.hasAttribute || !el.hasAttribute(attr)) return;
      const key = "__paramioOriginal_" + attr;
      if(!el[key]) el[key] = el.getAttribute(attr);
      el.setAttribute(attr, translateString(el[key], lang));
    });

    if(el.tagName === "INPUT" && INPUT_TYPES_TO_TRANSLATE.has((el.type||"").toLowerCase())){
      if(!el.__paramioOriginalValue) el.__paramioOriginalValue = el.value;
      el.value = translateString(el.__paramioOriginalValue, lang);
    }
  }

  function walk(lang){
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        const p = node.parentElement;
        if(!p || SKIP_TAGS.has(p.tagName)) return NodeFilter.FILTER_REJECT;
        if(!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_SKIP;
        if(looksTechnicalOnly(node.nodeValue)) return NodeFilter.FILTER_SKIP;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes=[];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(n=>translateTextNode(n, lang));

    document.querySelectorAll("*").forEach(el=>translateAttributes(el, lang));
    document.querySelectorAll("option").forEach(op=>{
      if(!op.__paramioOriginalText) op.__paramioOriginalText = op.textContent;
      op.textContent = translateString(op.__paramioOriginalText, lang);
    });

    document.querySelectorAll(".paramio-lang-switch button").forEach(b=>b.classList.toggle("active", b.dataset.lang===lang));
  }

  function observe(){
    if(window.__paramioV250Observer) return;
    window.__paramioV250Observer = new MutationObserver(function(){
      clearTimeout(window.__paramioV250Timer);
      window.__paramioV250Timer = setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 120);
    });
    window.__paramioV250Observer.observe(document.body, {childList:true, subtree:true, characterData:true});
  }

  function makeSwitch(){
    if(document.getElementById("paramioLangSwitch")) return;
    const box = document.createElement("div");
    box.id="paramioLangSwitch";
    box.className="paramio-lang-switch";
    box.innerHTML='<strong style="font-size:12px;margin:0 4px">LANG</strong><button data-lang="es">ES</button><button data-lang="en">EN</button>';
    document.body.appendChild(box);
    box.querySelectorAll("button").forEach(btn=>{
      btn.addEventListener("click",()=>{
        localStorage.setItem("paramio_doc_lang",btn.dataset.lang);
        walk(btn.dataset.lang);
      });
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    makeSwitch();
    const lang = localStorage.getItem("paramio_doc_lang") || "es";
    walk(lang);
    observe();
    setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 500);
    setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 1500);
  });

  window.paramioSetLanguage = function(lang){
    localStorage.setItem("paramio_doc_lang",lang);
    walk(lang);
  };
  window.paramioTranslateNow = function(){ walk(localStorage.getItem("paramio_doc_lang") || "es"); };
})();
</script>
</body></html>
