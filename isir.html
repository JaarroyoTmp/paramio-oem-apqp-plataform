<script id="paramio-isir-oem-render-safe">
(function(){
  const root = document.getElementById("root");

  function getProject(){
    try{
      if(typeof loadProject === "function"){
        const p = loadProject();
        if(p) return p;
      }
    }catch(e){ console.warn("loadProject failed", e); }

    const keys = [
      "paramio_project",
      "paramioProject",
      "paramio_oem_project",
      "oem_project",
      "project"
    ];

    for(const key of keys){
      try{
        const raw = localStorage.getItem(key);
        if(raw) return JSON.parse(raw);
      }catch(e){}
    }
    return null;
  }

  function normalizeProject(p){
    if(!p) return null;
    if(!Array.isArray(p.characteristics)){
      if(Array.isArray(p.chars)) p.characteristics = p.chars;
      else if(Array.isArray(p.items)) p.characteristics = p.items;
      else if(Array.isArray(p.rows)) p.characteristics = p.rows;
      else p.characteristics = [];
    }
    p.meta = p.meta || {};
    return p;
  }

  function applyKcs(project){
    try{
      if(typeof applyKcsSelectionToProject === "function"){
        const applied = applyKcsSelectionToProject(project);
        if(applied) return applied;
      }
    }catch(e){ console.warn("applyKcsSelectionToProject failed", e); }
    return project;
  }

  function metaHtml(project){
    const m = project.meta || {};
    return '<div class="metaBox">' +
      '<b>Referencia:</b> ' + esc(m.reference || m.ref || "") + '<br>' +
      '<b>Revisión:</b> ' + esc(m.revision || m.rev || "") + '<br>' +
      '<b>Cliente:</b> ' + esc(m.client || "") + '<br>' +
      '<b>Pieza:</b> ' + esc(m.partName || m.part || "") + '<br>' +
      '<b>Fecha:</b> ' + esc(m.date || "") + '<br>' +
      '<b>Nº Plan Control:</b> ' + esc(m.planNo || "") +
    '</div>';
  }

  function noDataHtml(){
    return '<section class="card"><h2>ISIR</h2>' +
      '<div class="notice">No hay datos cargados en este navegador. Vuelve a <b>Inicio / Cargar</b>, procesa la documentación y entra de nuevo en ISIR desde el menú.</div>' +
      '</section>';
  }

  function numberOf(c, idx){
    return c.number ?? c.no ?? c.globo ?? c.balloon ?? c.id ?? (idx + 1);
  }

  function typeOf(c){
    return c.type || c.featureType || c.kind || c.tipo || c.family || "";
  }

  function charText(c){
    return c.value || c.characteristic || c.caracteristica || c.name || c.rawValue || c.decodedValue || "";
  }

  function specText(c){
    const parts = [];
    if(c.nominal !== undefined && c.nominal !== null && c.nominal !== "") parts.push(String(c.nominal));
    if(c.lower !== undefined && c.lower !== null && c.lower !== "") parts.push("LI " + String(c.lower));
    if(c.upper !== undefined && c.upper !== null && c.upper !== "") parts.push("LS " + String(c.upper));
    const composed = parts.join(" / ");
    return c.specification || c.spec || c.tolerance || c.especificacion || composed || "";
  }

  function getResults(c){
    const r = c.results || c.resultados || c.measures || c.medidas || {};
    if(Array.isArray(r)){
      const o = {};
      r.forEach((v,i)=>{ o[String(i+1)] = v; });
      return o;
    }
    return r || {};
  }

  function selectedPieces(project){
    const pieces = new Set();

    (project.characteristics || []).forEach(c=>{
      Object.keys(getResults(c)).forEach(k=>{
        if(k !== "undefined" && k !== "null" && k !== "") pieces.add(String(k));
      });
    });

    if(Array.isArray(project.pcdmisFiles)){
      project.pcdmisFiles.forEach((_,i)=>pieces.add(String(i+1)));
    }

    if(project.pcdmisBlocks && typeof project.pcdmisBlocks === "object"){
      Object.keys(project.pcdmisBlocks).forEach(k=>pieces.add(String(k)));
    }

    if(pieces.size === 0) pieces.add("1");

    return Array.from(pieces).sort((a,b)=>{
      const na = Number(a), nb = Number(b);
      if(Number.isFinite(na) && Number.isFinite(nb)) return na - nb;
      return String(a).localeCompare(String(b));
    });
  }

  function resultValue(r){
    if(r === undefined || r === null || r === "") return "-";
    if(typeof r !== "object") return r;
    if(Array.isArray(r)){
      return r.map(resultValue).filter(v=>v !== "-").join("<br>") || "-";
    }

    const directKeys = [
      "value","result","medicion","measurement","actual","measured",
      "valor","resultado","dimension","measuredValue","displayValue"
    ];
    for(const key of directKeys){
      if(r[key] !== undefined && r[key] !== null && r[key] !== "") return r[key];
    }

    if(r.items && Array.isArray(r.items)){
      return r.items.map(resultValue).filter(v=>v !== "-").join("<br>") || "-";
    }

    if(r.values && Array.isArray(r.values)){
      return r.values.map(resultValue).filter(v=>v !== "-").join("<br>") || "-";
    }

    return "-";
  }

  function rawStatus(r){
    if(r === undefined || r === null || r === "") return "";
    if(typeof r !== "object"){
      const s = String(r).toUpperCase();
      if(s.includes("NOK")) return "NOK";
      if(s.includes("OK")) return "OK";
      return "";
    }

    const statusKeys = ["status","estado","state","resultStatus","oknok","decision"];
    for(const key of statusKeys){
      if(r[key] !== undefined && r[key] !== null && r[key] !== ""){
        const s = String(r[key]).toUpperCase();
        if(s.includes("NOK")) return "NOK";
        if(s.includes("OK")) return "OK";
        if(s.includes("PEND")) return "PEND.";
      }
    }

    if(r.ok === true || r.isOk === true || r.pass === true) return "OK";
    if(r.ok === false || r.isOk === false || r.pass === false) return "NOK";

    return "";
  }

  function pieceStatus(c, piece){
    const r = getResults(c)[piece];
    const s = rawStatus(r);
    if(s) return s;

    const v = resultValue(r);
    if(v === "-" || v === "") return "PEND.";

    // If validation engine left no explicit status but value exists,
    // keep OEM-safe assumption as OK only when characteristic global status is OK.
    const global = rawStatus(c);
    if(global) return global;

    return "OK";
  }

  function overallStatus(c, pieces){
    const statuses = pieces.map(p=>pieceStatus(c,p));
    if(statuses.some(s=>String(s).toUpperCase().includes("NOK"))) return "NOK";
    if(statuses.some(s=>String(s).toUpperCase().includes("OK"))) return "OK";
    return "PEND.";
  }

  function statusPill(status){
    const s = String(status || "PEND.").toUpperCase();
    const cls = s.includes("NOK") ? "nok" : (s.includes("OK") ? "ok" : "pend");
    return '<span class="pill ' + cls + '">' + esc(status || "PEND.") + '</span>';
  }

  function resultCell(c, piece){
    const r = getResults(c)[piece];
    const v = resultValue(r);
    if(v === "-" || v === "") return "-";
    return '<span class="resultBox">' + esc(v) + '</span>';
  }

  function loadKcsSelection(project){
    const ref = project?.meta?.reference || project?.meta?.ref || "default";
    const keys = [
      "paramio_kcs_selection_" + ref,
      "paramio_kcs_selection",
      "paramio_kcs_v218"
    ];
    for(const key of keys){
      try{
        const raw = localStorage.getItem(key);
        if(raw) return JSON.parse(raw) || {};
      }catch(e){}
    }
    return {};
  }

  function isKcs(c, project){
    const sel = loadKcsSelection(project);
    const n = String(c.number ?? c.no ?? c.globo ?? "");
    return !!c.kcs || !!c.isKcs || !!c.KCS || !!sel[n] || !!sel[c.number] || !!sel[c.no];
  }

  function filterRows(rows){
    const q = String(window.__lastFilter || "").trim().toLowerCase();
    if(!q) return rows || [];
    return (rows || []).filter(c=>JSON.stringify(c).toLowerCase().includes(q));
  }

  window.render = function render(){
    let project = normalizeProject(getProject());
    project = applyKcs(project);
    window.__paramioCurrentProject = project;

    if(!project || !project.characteristics || !project.characteristics.length){
      root.innerHTML = noDataHtml();
      return;
    }

    const pieces = selectedPieces(project);
    const all = project.characteristics || [];
    const chars = filterRows(all);

    const okCount = all.filter(c=>overallStatus(c,pieces)==="OK").length;
    const nokCount = all.filter(c=>overallStatus(c,pieces)==="NOK").length;
    const pendCount = all.filter(c=>overallStatus(c,pieces)==="PEND.").length;
    const kcsCount = all.filter(c=>isKcs(c,project)).length;

    root.innerHTML =
      '<section class="card"><div class="docHead"><div>' +
        '<img class="logoSmall" src="assets/logo_paramio.png" alt="Paramio">' +
        '<h2>ISIR</h2>' +
        '<p>Informe de inspección inicial. Las KCS se identifican visualmente según la selección dimensional.</p>' +
      '</div>' + metaHtml(project) + '</div></section>' +

      '<section class="card noPrint"><div class="toolbar">' +
        '<input id="filter" type="search" placeholder="Filtrar globo / característica / estado">' +
        '<div class="actions">' +
          '<a class="btn light" href="dimensional.html">Marcar KCS en Dimensional</a>' +
          '<a class="btn orange" href="diagnostico.html">Diagnóstico</a>' +
        '</div>' +
      '</div></section>' +

      '<section class="card"><div class="statGrid">' +
        '<div class="stat"><b>' + esc(all.length) + '</b><span>Cotas</span></div>' +
        '<div class="stat"><b>' + esc(kcsCount) + '</b><span>KCS</span></div>' +
        '<div class="stat"><b>' + esc(okCount) + '</b><span>OK</span></div>' +
        '<div class="stat"><b>' + esc(nokCount) + '</b><span>NOK</span></div>' +
        '<div class="stat"><b>' + esc(pendCount) + '</b><span>Sin medición</span></div>' +
      '</div></section>' +

      '<section class="card"><div class="tableWrap"><table><thead><tr>' +
        '<th>Globo</th><th>KCS</th><th>Tipo</th><th>Característica Inspection</th><th>Especificación</th>' +
        pieces.map(p=>'<th>Registro pieza ' + esc(p) + '</th><th>Estado pieza ' + esc(p) + '</th>').join("") +
      '</tr></thead><tbody>' +
        chars.map((c,idx)=>
          '<tr>' +
            '<td>' + esc(numberOf(c,idx)) + '</td>' +
            '<td>' + (isKcs(c,project) ? '<span class="pill kcs">KCS</span>' : '') + '</td>' +
            '<td><b>' + esc(typeOf(c)) + '</b></td>' +
            '<td>' + esc(charText(c)) + '</td>' +
            '<td>' + esc(specText(c)) + '</td>' +
            pieces.map(p=>'<td>' + resultCell(c,p) + '</td><td>' + statusPill(pieceStatus(c,p)) + '</td>').join("") +
          '</tr>'
        ).join("") +
      '</tbody></table></div></section>';

    const f = document.getElementById("filter");
    if(f){
      f.value = window.__lastFilter || "";
      f.addEventListener("input", function(){
        window.__lastFilter = this.value;
        render();
      });
    }
  };

  render();
})();
</script>

  const SKIP_TAGS = new Set(["SCRIPT","STYLE","NOSCRIPT","TEXTAREA"]);
  const INPUT_TYPES_TO_TRANSLATE = new Set(["button","submit","reset"]);

  function sortedKeys(){
    return Object.keys(DICT).sort((a,b)=>b.length-a.length);
  }

  function looksTechnicalOnly(txt){
    const t = String(txt || "").trim();
    if(!t) return true;
    if(/^[-+0-9.,/ %:;()ØA-Z_]+$/.test(t) && !/[a-záéíóúñü]/i.test(t.replace(/[A-Z]/g,''))) return true;
    if(/^CE\d+|^[A-Z]{1,4}\d{2,}/.test(t)) return true;
    return false;
  }

  function translateString(original, lang){
    if(lang === "es") return original;
    let txt = String(original);
    for(const es of sortedKeys()){
      const en = DICT[es];
      txt = txt.split(es).join(en);
      txt = txt.split(es.toUpperCase()).join(String(en).toUpperCase());
    }
    return txt;
  }

  function translateTextNode(node, lang){
    const parent = node.parentElement;
    if(!parent || SKIP_TAGS.has(parent.tagName)) return;
    const val = node.nodeValue;
    if(!val || !val.trim()) return;
    if(looksTechnicalOnly(val)) return;
    if(!node.__paramioOriginalText) node.__paramioOriginalText = val;
    node.nodeValue = translateString(node.__paramioOriginalText, lang);
  }

  function translateAttributes(el, lang){
    ["placeholder","title","aria-label","alt"].forEach(attr=>{
      if(!el.hasAttribute || !el.hasAttribute(attr)) return;
      const key = "__paramioOriginal_" + attr;
      if(!el[key]) el[key] = el.getAttribute(attr);
      el.setAttribute(attr, translateString(el[key], lang));
    });

    if(el.tagName === "INPUT" && INPUT_TYPES_TO_TRANSLATE.has((el.type||"").toLowerCase())){
      if(!el.__paramioOriginalValue) el.__paramioOriginalValue = el.value;
      el.value = translateString(el.__paramioOriginalValue, lang);
    }
  }

  function walk(lang){
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        const p = node.parentElement;
        if(!p || SKIP_TAGS.has(p.tagName)) return NodeFilter.FILTER_REJECT;
        if(!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_SKIP;
        if(looksTechnicalOnly(node.nodeValue)) return NodeFilter.FILTER_SKIP;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes=[];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(n=>translateTextNode(n, lang));

    document.querySelectorAll("*").forEach(el=>translateAttributes(el, lang));
    document.querySelectorAll("option").forEach(op=>{
      if(!op.__paramioOriginalText) op.__paramioOriginalText = op.textContent;
      op.textContent = translateString(op.__paramioOriginalText, lang);
    });

    document.querySelectorAll(".paramio-lang-switch button").forEach(b=>b.classList.toggle("active", b.dataset.lang===lang));
  }

  function observe(){
    if(window.__paramioV250Observer) return;
    window.__paramioV250Observer = new MutationObserver(function(){
      clearTimeout(window.__paramioV250Timer);
      window.__paramioV250Timer = setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 120);
    });
    window.__paramioV250Observer.observe(document.body, {childList:true, subtree:true, characterData:true});
  }

  function makeSwitch(){
    if(document.getElementById("paramioLangSwitch")) return;
    const box = document.createElement("div");
    box.id="paramioLangSwitch";
    box.className="paramio-lang-switch";
    box.innerHTML='<strong style="font-size:12px;margin:0 4px">LANG</strong><button data-lang="es">ES</button><button data-lang="en">EN</button>';
    document.body.appendChild(box);
    box.querySelectorAll("button").forEach(btn=>{
      btn.addEventListener("click",()=>{
        localStorage.setItem("paramio_doc_lang",btn.dataset.lang);
        walk(btn.dataset.lang);
      });
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    makeSwitch();
    const lang = localStorage.getItem("paramio_doc_lang") || "es";
    walk(lang);
    observe();
    setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 500);
    setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 1500);
  });

  window.paramioSetLanguage = function(lang){
    localStorage.setItem("paramio_doc_lang",lang);
    walk(lang);
  };
  window.paramioTranslateNow = function(){ walk(localStorage.getItem("paramio_doc_lang") || "es"); };
})();
</script>
