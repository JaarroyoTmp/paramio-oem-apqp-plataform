<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KCS V223</title><link rel="stylesheet" href="assets/platform.css"><script src="core/storage.js"></script><script src="core/type-normalizer.js"></script><script src="core/parser-inspection.js"></script><script src="core/parser-pcdmis.js"></script><script src="core/validation-engine.js"></script><script src="core/strategies/dimension.js"></script><script src="core/strategies/position.js"></script><script src="core/strategies/profile.js"></script><script src="core/strategies/diameter.js"></script><script src="core/strategies/flatness.js"></script><script src="core/strategies/orientation.js"></script><script src="core/strategies/depth.js"></script><script src="core/strategies/radius.js"></script><script src="core/strategies/thread.js"></script><script src="core/result-engine.js"></script><script src="core/diagnostics-engine.js"></script></head>
<body><div class="app"><script>document.write(renderShell('kcs'))</script><main class="main"><header class="top"><div><h1>Informe KCS</h1><p>Características críticas seleccionadas previamente en el informe dimensional.</p></div><div class="actions noPrint"><a class="btn light" href="dimensional.html">Volver a Dimensional</a><button class="btn light" onclick="window.print()">Guardar PDF</button><button class="btn" onclick="window.print()">Imprimir</button></div></header><div id="root"></div></main></div><script>
let p=loadProject();
const root=document.getElementById('root');
function render(){
  p=applyKcsSelectionToProject(loadProject());
  if(!p||!p.characteristics.length){root.innerHTML=noDataHtml();return;}
  const kcsMap=loadKcsSelection(p);
  const selectedAll=(p.characteristics||[]).filter(c=>!!kcsMap[String(c.number)]);
  const chars=filterRows(selectedAll);
  const pieces=selectedPieces(p,false);
  const emptyMsg=selectedAll.length?'' : `<div class="notice"><b>No hay KCS seleccionadas.</b><br>La selección se hace únicamente desde el informe Dimensional, en la columna KCS.</div>`;
  root.innerHTML=`<section class="card"><div class="docHead"><div><img class="logoSmall" src="assets/logo_paramio.png"><h2>Informe KCS</h2><p>Listado exclusivo de cotas marcadas como KCS desde Dimensional.</p></div>${metaHtml(p)}</div></section>
  <section class="card noPrint"><div class="toolbar"><input id="filter" type="search" placeholder="Filtrar KCS seleccionadas" oninput="window.__lastFilter=this.value;render()"><div>${piecesControl(p)}</div><div class="actions"><a class="btn light" href="dimensional.html">Marcar desde Dimensional</a><a class="btn orange" href="diagnostico.html">Diagnóstico</a></div></div></section>
  <section class="card"><div class="statGrid"><div class="stat"><b>${p.characteristics.length}</b><span>Cotas totales</span></div><div class="stat"><b>${selectedAll.length}</b><span>KCS seleccionadas</span></div><div class="stat"><b>${selectedAll.filter(c=>statusOf(c)==='NOK').length}</b><span>KCS NOK</span></div><div class="stat"><b>${selectedAll.filter(c=>statusOf(c)==='OK').length}</b><span>KCS OK</span></div><div class="stat"><b>${pieceLabels(p).length}</b><span>Piezas detectadas</span></div></div></section>
  <section class="card"><h2>Listado KCS</h2>${emptyMsg}<div class="tableWrap"><table><thead><tr><th>Globo</th><th>Tipo</th><th>Característica</th><th>Especificación</th>${pieces.map(x=>`<th>Registro pieza ${esc(x)}</th><th>Estado pieza ${esc(x)}</th>`).join('')}</tr></thead><tbody>${chars.map(c=>`<tr><td>${esc(c.number)}</td><td><b>${esc(featureType(c))}</b></td><td>${esc(cleanChar(c.value))}</td><td>${specText(c)}</td>${pieces.map(x=>`<td class="result">${resultCell(c,x)}</td><td>${statusPill(pieceStatus(c,x))}</td>`).join('')}</tr>`).join('')}</tbody></table></div></section>`;
  const f=document.getElementById('filter');if(f)f.value=(window.__lastFilter||'');
}
render();
</script>
<script>
/* PARAMIO_V247_KCS_SINGLE_SOURCE
   KCS lee la lista exacta guardada desde Dimensional.
   Si la tabla tiene todas las cotas, filtra. Si no, muestra aviso de sincronización.
*/
(function(){
  const KCS_KEYS = [
    "paramio_kcs_globos",
    "paramio_kcs_selected_globos",
    "paramio_selected_kcs",
    "paramio_dimensional_kcs",
    "kcsSelectedGlobos"
  ];

  function readKcs(){
    for(const k of KCS_KEYS){
      try{
        const raw = localStorage.getItem(k);
        if(!raw) continue;
        const parsed = JSON.parse(raw);
        if(Array.isArray(parsed) && parsed.length){
          return parsed.map(x=>String(parseInt(x,10))).filter(x=>x !== "NaN");
        }
      }catch(e){}
    }
    return [];
  }

  function getGloboFromRow(row){
    const cells = Array.from(row.querySelectorAll("td,th"));
    for(const c of cells){
      const t = (c.innerText || c.textContent || "").trim();
      const m = t.match(/^(\d{1,5})$/);
      if(m) return String(parseInt(m[1],10));
    }
    return null;
  }

  function updateCounters(count, ok, nok){
    const cards = Array.from(document.querySelectorAll("*")).filter(el => {
      const t = (el.innerText || "").toUpperCase();
      return t.includes("KCS SELECCIONADAS") || t.includes("KCS OK") || t.includes("KCS NOK");
    });
    // No forzamos todos los contadores porque cada versión tiene estructura distinta.
  }

  function applyKcsFilter(){
    const selected = readKcs();
    const selectedSet = new Set(selected);
    const tables = Array.from(document.querySelectorAll("table"));
    let touched = false;
    let visible = 0;
    let totalRows = 0;

    tables.forEach(table=>{
      const rows = Array.from(table.querySelectorAll("tbody tr, tr")).filter(r=>r.querySelectorAll("td").length);
      if(!rows.length) return;
      let tableHasGlobos = false;

      rows.forEach(row=>{
        const globo = getGloboFromRow(row);
        if(!globo) return;
        tableHasGlobos = true;
        totalRows++;
        const show = selectedSet.has(globo);
        row.style.display = show ? "" : "none";
        if(show){
          visible++;
          row.classList.add("kcs-v247-visible");
        }
      });

      if(tableHasGlobos) touched = true;
    });

    let banner = document.getElementById("paramioKcsSyncBanner");
    if(!banner){
      banner = document.createElement("div");
      banner.id = "paramioKcsSyncBanner";
      banner.style.cssText = "margin:12px 0;padding:12px 14px;border-left:5px solid #1f5fbf;background:#eef5ff;color:#071a3a;font-weight:800";
      const anchor = document.querySelector("main") || document.body;
      anchor.insertBefore(banner, anchor.firstChild);
    }

    if(!selected.length){
      banner.innerHTML = "KCS V247: no hay selección guardada. Marca KCS en Dimensional y vuelve a este informe.";
      return;
    }

    if(touched && visible > 0){
      banner.innerHTML = "KCS V247 sincronizado desde Dimensional: " + selected.join(", ");
    }else{
      banner.innerHTML = "KCS V247 detectadas desde Dimensional (" + selected.join(", ") + "), pero esta vista KCS no contiene todas las cotas cargadas para filtrarlas. Abre Dimensional, guarda selección y vuelve a KCS.";
    }
  }

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(applyKcsFilter, 500);
    setTimeout(applyKcsFilter, 1500);
  });
  window.paramioApplyKcsFilterV247 = applyKcsFilter;
})();
</script>

  const SKIP_TAGS = new Set(["SCRIPT","STYLE","NOSCRIPT","TEXTAREA"]);
  const INPUT_TYPES_TO_TRANSLATE = new Set(["button","submit","reset"]);

  function sortedKeys(){
    return Object.keys(DICT).sort((a,b)=>b.length-a.length);
  }

  function looksTechnicalOnly(txt){
    const t = String(txt || "").trim();
    if(!t) return true;
    if(/^[-+0-9.,/ %:;()ØA-Z_]+$/.test(t) && !/[a-záéíóúñü]/i.test(t.replace(/[A-Z]/g,''))) return true;
    if(/^CE\d+|^[A-Z]{1,4}\d{2,}/.test(t)) return true;
    return false;
  }

  function translateString(original, lang){
    if(lang === "es") return original;
    let txt = String(original);
    for(const es of sortedKeys()){
      const en = DICT[es];
      txt = txt.split(es).join(en);
      txt = txt.split(es.toUpperCase()).join(String(en).toUpperCase());
    }
    return txt;
  }

  function translateTextNode(node, lang){
    const parent = node.parentElement;
    if(!parent || SKIP_TAGS.has(parent.tagName)) return;
    const val = node.nodeValue;
    if(!val || !val.trim()) return;
    if(looksTechnicalOnly(val)) return;
    if(!node.__paramioOriginalText) node.__paramioOriginalText = val;
    node.nodeValue = translateString(node.__paramioOriginalText, lang);
  }

  function translateAttributes(el, lang){
    ["placeholder","title","aria-label","alt"].forEach(attr=>{
      if(!el.hasAttribute || !el.hasAttribute(attr)) return;
      const key = "__paramioOriginal_" + attr;
      if(!el[key]) el[key] = el.getAttribute(attr);
      el.setAttribute(attr, translateString(el[key], lang));
    });

    if(el.tagName === "INPUT" && INPUT_TYPES_TO_TRANSLATE.has((el.type||"").toLowerCase())){
      if(!el.__paramioOriginalValue) el.__paramioOriginalValue = el.value;
      el.value = translateString(el.__paramioOriginalValue, lang);
    }
  }

  function walk(lang){
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        const p = node.parentElement;
        if(!p || SKIP_TAGS.has(p.tagName)) return NodeFilter.FILTER_REJECT;
        if(!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_SKIP;
        if(looksTechnicalOnly(node.nodeValue)) return NodeFilter.FILTER_SKIP;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes=[];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(n=>translateTextNode(n, lang));

    document.querySelectorAll("*").forEach(el=>translateAttributes(el, lang));
    document.querySelectorAll("option").forEach(op=>{
      if(!op.__paramioOriginalText) op.__paramioOriginalText = op.textContent;
      op.textContent = translateString(op.__paramioOriginalText, lang);
    });

    document.querySelectorAll(".paramio-lang-switch button").forEach(b=>b.classList.toggle("active", b.dataset.lang===lang));
  }

  function observe(){
    if(window.__paramioV250Observer) return;
    window.__paramioV250Observer = new MutationObserver(function(){
      clearTimeout(window.__paramioV250Timer);
      window.__paramioV250Timer = setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 120);
    });
    window.__paramioV250Observer.observe(document.body, {childList:true, subtree:true, characterData:true});
  }

  function makeSwitch(){
    if(document.getElementById("paramioLangSwitch")) return;
    const box = document.createElement("div");
    box.id="paramioLangSwitch";
    box.className="paramio-lang-switch";
    box.innerHTML='<strong style="font-size:12px;margin:0 4px">LANG</strong><button data-lang="es">ES</button><button data-lang="en">EN</button>';
    document.body.appendChild(box);
    box.querySelectorAll("button").forEach(btn=>{
      btn.addEventListener("click",()=>{
        localStorage.setItem("paramio_doc_lang",btn.dataset.lang);
        walk(btn.dataset.lang);
      });
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    makeSwitch();
    const lang = localStorage.getItem("paramio_doc_lang") || "es";
    walk(lang);
    observe();
    setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 500);
    setTimeout(()=>walk(localStorage.getItem("paramio_doc_lang") || "es"), 1500);
  });

  window.paramioSetLanguage = function(lang){
    localStorage.setItem("paramio_doc_lang",lang);
    walk(lang);
  };
  window.paramioTranslateNow = function(){ walk(localStorage.getItem("paramio_doc_lang") || "es"); };
